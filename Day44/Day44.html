<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Audit — LinkedIn Case File</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,500&family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1B2430;
    --paper:#F7F5F0;
    --paper-dim:#EEEAE0;
    --roast:#C6402E;
    --roast-dim:#E9D3CD;
    --grow:#2F8B6B;
    --grow-dim:#D4E7DE;
    --gold:#B8901F;
    --line:#D8D2C2;
    --shadow: 0 1px 0 rgba(27,36,48,0.08);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    line-height:1.5;
  }
  .wrap{max-width:820px;margin:0 auto;padding:36px 22px 90px;}
  .kicker{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--roast);
    display:flex;align-items:center;gap:8px;
    margin-bottom:10px;
  }
  .kicker::before{content:"";width:7px;height:7px;background:var(--roast);border-radius:50%;display:inline-block;}
  h1.title{
    font-family:'Fraunces',serif;
    font-weight:700;
    font-size:clamp(32px,5vw,46px);
    margin:0 0 6px;
    letter-spacing:-0.01em;
  }
  .subtitle{color:#5b6472;font-size:15px;max-width:520px;margin-bottom:28px;}
  .folder{
    background:#fff;
    border:1px solid var(--line);
    border-radius:2px;
    box-shadow:var(--shadow);
    position:relative;
    overflow:hidden;
  }
  .folder::before{
    content:"CONFIDENTIAL — PROFILE AUDIT";
    position:absolute;top:16px;right:-42px;
    background:var(--roast);color:#fff;
    font-family:'IBM Plex Mono',monospace;
    font-size:10px;letter-spacing:.08em;
    padding:3px 46px;
    transform:rotate(34deg);
    box-shadow:0 2px 6px rgba(0,0,0,.18);
    pointer-events:none;
  }
  .folder-inner{padding:28px 26px;}
  .step{display:none;}
  .step.active{display:block;animation:fade .35s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
  .choice-row{display:flex;gap:12px;margin-top:18px;flex-wrap:wrap;}
  .choice-btn{
    flex:1;min-width:180px;
    border:1.5px solid var(--line);
    background:var(--paper-dim);
    padding:18px 16px;
    border-radius:2px;
    cursor:pointer;
    font-family:'Fraunces',serif;
    font-size:17px;
    text-align:left;
    transition:.15s;
  }
  .choice-btn:hover{border-color:var(--ink);background:#fff;}
  .choice-btn small{display:block;font-family:'Inter',sans-serif;font-size:12px;color:#6b7280;margin-top:4px;font-weight:400;}
  label.field-label{
    display:block;
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--gold);
    margin:20px 0 6px;
  }
  label.field-label span.tag{color:#94989e;text-transform:none;letter-spacing:0;font-style:italic;}
  input[type=text], textarea, select{
    width:100%;
    padding:11px 12px;
    border:1.5px solid var(--line);
    border-radius:2px;
    font-family:'Inter',sans-serif;
    font-size:14.5px;
    background:var(--paper);
    color:var(--ink);
    resize:vertical;
  }
  input:focus, textarea:focus, select:focus{outline:2px solid var(--ink);outline-offset:1px;background:#fff;}
  textarea{min-height:80px;}
  .field-group{margin-bottom:2px;}
  .nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:28px;gap:12px;}
  .btn{
    font-family:'IBM Plex Mono',monospace;
    font-size:12.5px;
    letter-spacing:.04em;
    text-transform:uppercase;
    padding:12px 22px;
    border-radius:2px;
    border:1.5px solid var(--ink);
    background:var(--ink);
    color:#fff;
    cursor:pointer;
    transition:.15s;
  }
  .btn:hover{background:#0f151d;}
  .btn.ghost{background:transparent;color:var(--ink);}
  .btn.ghost:hover{background:var(--paper-dim);}
  .btn:disabled{opacity:.45;cursor:not-allowed;}
  .progress{display:flex;gap:5px;margin-bottom:22px;}
  .progress i{flex:1;height:3px;background:var(--line);border-radius:2px;}
  .progress i.done{background:var(--grow);}
  .progress i.now{background:var(--roast);}

  /* loading */
  .loading{text-align:center;padding:60px 20px;}
  .stamp-spin{
    width:74px;height:74px;margin:0 auto 22px;
    border:3px solid var(--roast);
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-family:'Fraunces',serif;font-weight:700;color:var(--roast);
    font-size:11px;letter-spacing:.05em;text-align:center;
    animation:spin 1.8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading-msg{font-family:'IBM Plex Mono',monospace;font-size:13px;color:#6b7280;}

  /* report */
  #report{display:none;}
  .tab{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;letter-spacing:.1em;text-transform:uppercase;
    color:#fff;background:var(--ink);
    display:inline-block;padding:6px 14px;border-radius:2px 2px 0 0;
    margin-bottom:-1px;
  }
  .section{
    background:#fff;border:1px solid var(--line);border-radius:0 2px 2px 2px;
    padding:24px 22px;margin-bottom:30px;
  }
  .section h2{
    font-family:'Fraunces',serif;font-size:24px;margin:0 0 4px;
  }
  .section .desc{color:#6b7280;font-size:13.5px;margin-bottom:18px;}
  .stampbig{
    display:inline-flex;flex-direction:column;align-items:center;justify-content:center;
    width:110px;height:110px;border:3px solid var(--roast);border-radius:50%;
    transform:rotate(-6deg);color:var(--roast);font-family:'Fraunces',serif;
    margin:6px 18px 6px 0;float:left;
  }
  .stampbig .num{font-size:34px;font-weight:700;line-height:1;}
  .stampbig .denom{font-size:11px;font-family:'IBM Plex Mono',monospace;letter-spacing:.05em;}
  .overall-row{overflow:auto;margin-bottom:6px;}
  .overall-row p{margin:10px 0 0;color:#3b4250;font-size:14.5px;}

  .card{
    border:1px solid var(--line);border-left:4px solid var(--roast);
    padding:16px 18px;margin-bottom:14px;background:var(--paper);
  }
  .card.grow{border-left-color:var(--grow);}
  .card-head{display:flex;justify-content:space-between;align-items:baseline;gap:10px;flex-wrap:wrap;}
  .card-head h3{font-family:'Fraunces',serif;font-size:17px;margin:0;}
  .score-pill{
    font-family:'IBM Plex Mono',monospace;font-size:12px;
    background:var(--roast-dim);color:var(--roast);padding:2px 9px;border-radius:20px;
  }
  .reaction{font-style:italic;color:#3b4250;margin:8px 0 10px;font-size:14px;}
  .kv{margin:6px 0;font-size:14px;}
  .kv b{font-family:'IBM Plex Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:.04em;margin-right:6px;}

  .opt{border:1px solid var(--line);padding:14px 16px;margin-bottom:12px;background:var(--paper);}
  .opt .lab{font-family:'IBM Plex Mono',monospace;font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--grow);margin-bottom:6px;}
  .opt .txt{font-family:'Fraunces',serif;font-size:16.5px;margin-bottom:8px;}
  .opt .why{font-size:13px;color:#6b7280;}

  .before-after{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
  @media(max-width:600px){.before-after{grid-template-columns:1fr;}}
  .ba-box{padding:12px 14px;font-size:13.5px;border:1px solid var(--line);}
  .ba-box.before{background:var(--roast-dim);}
  .ba-box.after{background:var(--grow-dim);}
  .ba-lab{font-family:'IBM Plex Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;display:block;}
  .ba-box.before .ba-lab{color:var(--roast);}
  .ba-box.after .ba-lab{color:var(--grow);}

  .keywords{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
  .keywords span{background:var(--ink);color:#fff;font-family:'IBM Plex Mono',monospace;font-size:11px;padding:4px 9px;border-radius:20px;}

  .skill-cols{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:8px;}
  @media(max-width:600px){.skill-cols{grid-template-columns:1fr;}}
  .skill-cols h4{font-family:'IBM Plex Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:.06em;margin:0 0 8px;}
  .skill-cols ul{margin:0;padding-left:18px;font-size:13.5px;}
  .pin3{margin-top:12px;font-size:13.5px;}

  table.scoretable{width:100%;border-collapse:collapse;font-size:14px;margin-top:6px;}
  table.scoretable th, table.scoretable td{padding:9px 8px;border-bottom:1px solid var(--line);text-align:left;}
  table.scoretable th{font-family:'IBM Plex Mono',monospace;font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:#6b7280;}
  .delta{font-family:'IBM Plex Mono',monospace;font-weight:600;color:var(--grow);}
  .overall-final{
    margin-top:16px;padding:16px;background:var(--ink);color:#fff;
    display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;
  }
  .overall-final .num{font-family:'Fraunces',serif;font-size:28px;}

  .day{border:1px solid var(--line);margin-bottom:10px;}
  .day-head{
    padding:12px 16px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;
    background:var(--paper-dim);
  }
  .day-head .d{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--gold);letter-spacing:.06em;}
  .day-head h4{margin:2px 0 0;font-family:'Fraunces',serif;font-size:16.5px;}
  .day-body{padding:0 16px;max-height:0;overflow:hidden;transition:.25s ease;font-size:14px;}
  .day-body-inner{padding:14px 0;white-space:pre-line;}
  .day.open .day-body{max-height:800px;}
  .chevron{transition:.2s;font-size:13px;color:#6b7280;}
  .day.open .chevron{transform:rotate(90deg);}

  .summary-card{
    border:2px solid var(--ink);padding:26px 24px;background:#fff;
    font-family:'Fraunces',serif;position:relative;
  }
  .summary-card .sc-kicker{
    font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--roast);
    text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px;
  }
  .summary-card .scores{display:flex;gap:26px;margin:14px 0;}
  .summary-card .scores div{text-align:center;}
  .summary-card .scores .n{font-size:30px;font-weight:700;}
  .summary-card .scores .l{font-family:'IBM Plex Mono',monospace;font-size:10px;color:#6b7280;text-transform:uppercase;}
  .summary-card ol{padding-left:20px;font-size:14.5px;font-family:'Inter',sans-serif;}
  .summary-card .fix{margin-top:14px;padding:12px;background:var(--paper-dim);font-family:'Inter',sans-serif;font-size:14px;font-style:italic;}
  .copybtn{margin-top:16px;}
  .error-box{border:1.5px solid var(--roast);background:var(--roast-dim);color:#7a2417;padding:16px;font-size:14px;margin-top:16px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="kicker">Case file 001</div>
  <h1 class="title">Profile Audit</h1>
  <p class="subtitle">A recruiter's-eye teardown of your LinkedIn — then a full rebuild and a 7-day plan to make it work. Answer honestly; the roast only helps if the input does.</p>

  <div class="folder">
    <div class="folder-inner">

      <div class="progress" id="progress"></div>

      <!-- STEP 0: has profile? -->
      <div class="step active" data-step="0">
        <label class="field-label">First — do you already have a LinkedIn profile?</label>
        <div class="choice-row">
          <button class="choice-btn" onclick="chooseHasProfile(true)">Yes, I have one <small>I'll roast it, then rebuild it</small></button>
          <button class="choice-btn" onclick="chooseHasProfile(false)">No, starting fresh <small>I'll build one from scratch with you</small></button>
        </div>
      </div>

      <!-- STEP 1a: existing profile fields -->
      <div class="step" data-step="1a">
        <div class="field-group">
          <label class="field-label">1. Current headline</label>
          <input type="text" id="f_headline" placeholder="e.g. Marketing Manager at XYZ Corp">
        </div>
        <div class="field-group">
          <label class="field-label">2. About section <span class="tag">paste it as-is</span></label>
          <textarea id="f_about" placeholder="Paste your full About section..."></textarea>
        </div>
        <div class="nav-row">
          <button class="btn ghost" onclick="goStep('0')">Back</button>
          <button class="btn" onclick="goStep('2a')">Next</button>
        </div>
      </div>

      <div class="step" data-step="2a">
        <div class="field-group">
          <label class="field-label">3. Most recent experience entry <span class="tag">title, company, bullets</span></label>
          <textarea id="f_experience" placeholder="Title, Company&#10;- bullet 1&#10;- bullet 2&#10;- bullet 3" style="min-height:120px;"></textarea>
        </div>
        <div class="field-group">
          <label class="field-label">4. Top skills <span class="tag">5–10, comma-separated</span></label>
          <input type="text" id="f_skills" placeholder="e.g. SQL, Stakeholder Management, Figma, ...">
        </div>
        <div class="field-group">
          <label class="field-label">5. Target goal</label>
          <select id="f_goal">
            <option value="Job">Landing a job</option>
            <option value="Clients">Attracting clients</option>
            <option value="Thought Leadership">Building thought leadership</option>
            <option value="Network Growth">Growing my network</option>
          </select>
        </div>
        <div class="nav-row">
          <button class="btn ghost" onclick="goStep('1a')">Back</button>
          <button class="btn" onclick="submitAudit(true)">Run the audit</button>
        </div>
      </div>

      <!-- STEP 1b: no profile fields -->
      <div class="step" data-step="1b">
        <div class="field-group">
          <label class="field-label">1. Name & current role or student status</label>
          <input type="text" id="g_name" placeholder="e.g. Priya Sharma, final-year CS student">
        </div>
        <div class="field-group">
          <label class="field-label">2. Top 3 skills</label>
          <input type="text" id="g_skills" placeholder="e.g. Python, UX research, public speaking">
        </div>
        <div class="field-group">
          <label class="field-label">3. 1–2 achievements or projects you're proud of</label>
          <textarea id="g_achieve" placeholder="Tell me what you built, won, led, or shipped..."></textarea>
        </div>
        <div class="nav-row">
          <button class="btn ghost" onclick="goStep('0')">Back</button>
          <button class="btn" onclick="goStep('2b')">Next</button>
        </div>
      </div>

      <div class="step" data-step="2b">
        <div class="field-group">
          <label class="field-label">4. Who do you want to attract?</label>
          <select id="g_attract">
            <option value="Recruiters">Recruiters</option>
            <option value="Clients">Clients</option>
            <option value="Collaborators">Collaborators / peers</option>
          </select>
        </div>
        <div class="field-group">
          <label class="field-label">5. One sentence: what makes you different?</label>
          <textarea id="g_diff" placeholder="Finish the sentence: I'm different because..." style="min-height:60px;"></textarea>
        </div>
        <div class="nav-row">
          <button class="btn ghost" onclick="goStep('1b')">Back</button>
          <button class="btn" onclick="submitAudit(false)">Build my profile</button>
        </div>
      </div>

      <!-- LOADING -->
      <div class="step" data-step="loading">
        <div class="loading">
          <div class="stamp-spin">AUDIT<br>IN<br>PROGRESS</div>
          <div class="loading-msg" id="loadingMsg">Reviewing your profile...</div>
        </div>
      </div>

      <!-- ERROR -->
      <div class="step" data-step="error">
        <div class="error-box" id="errorBox"></div>
        <div class="nav-row"><button class="btn ghost" onclick="goStep('0')">Start over</button></div>
      </div>

    </div>
  </div>

  <div id="report"></div>
</div>

<script>
let hasProfile = true;

function stepList(){
  return hasProfile ? ['0','1a','2a'] : ['0','1b','2b'];
}
function renderProgress(current){
  const steps = stepList();
  const idx = steps.indexOf(current);
  const el = document.getElementById('progress');
  el.innerHTML = steps.map((s,i)=>{
    let cls = '';
    if(i < idx) cls = 'done';
    else if(i === idx) cls = 'now';
    return `<i class="${cls}"></i>`;
  }).join('');
}
function goStep(step){
  document.querySelectorAll('.step').forEach(s=>s.classList.remove('active'));
  document.querySelector(`.step[data-step="${step}"]`).classList.add('active');
  if(stepList().includes(step)) renderProgress(step);
  window.scrollTo({top:0,behavior:'smooth'});
}
function chooseHasProfile(val){
  hasProfile = val;
  goStep(val ? '1a' : '1b');
}

const loadingMessages = [
  "Reviewing your headline...",
  "Reading between your bullet points...",
  "Checking if recruiters would keep scrolling...",
  "Rewriting your About section...",
  "Building your 7-day plan..."
];
let loadingInterval;
function startLoadingMessages(){
  let i = 0;
  document.getElementById('loadingMsg').textContent = loadingMessages[0];
  loadingInterval = setInterval(()=>{
    i = (i+1) % loadingMessages.length;
    document.getElementById('loadingMsg').textContent = loadingMessages[i];
  }, 1400);
}

const SYSTEM_PROMPT = `You are a LinkedIn Optimization Expert, Personal Branding Consultant, and ex-Recruiter who has reviewed 50,000+ profiles. Your job is to roast a LinkedIn profile (or, if the person has none yet, help build one from scratch), rebuild it, and produce a 7-day activation plan.

RULES:
- Use ONLY information the user provides. Never invent achievements, roles, companies, or metrics. If information is missing, note what should be added rather than fabricating it.
- Tone: direct, specific, like a brutally honest friend who wants them to succeed. Zero fluff. Quote their own words back at them when critiquing.
- Explain the WHY behind every change.
- Respond with ONLY a single valid JSON object — no markdown fences, no preamble, no commentary outside the JSON.

JSON SHAPE (exact keys):
{
  "hasProfile": boolean,
  "roast": null OR {
    "headline": {"score": number 0-10, "reaction": string, "problem": string, "why": string, "cost": string},
    "aboutHook": {"score": number 0-10, "reaction": string, "problem": string, "why": string, "cost": string},
    "aboutFull": {"score": number 0-10, "reaction": string, "problem": string, "why": string, "cost": string},
    "experience": {"score": number 0-10, "reaction": string, "problem": string, "why": string, "cost": string},
    "skills": {"score": number 0-10, "reaction": string, "problem": string, "why": string, "cost": string},
    "overall": number 0-100
  },
  "headlineOptions": [
    {"type": "Keyword-Optimized", "text": string, "explain": string},
    {"type": "Value-Proposition", "text": string, "explain": string},
    {"type": "Authority", "text": string, "explain": string}
  ],
  "about": {"hook": string, "story": string, "proof": string, "cta": string, "keywords": [string, ...]},
  "experienceBullets": [ {"before": string OR null, "after": string}, ... 3 to 5 items ],
  "skillsRec": {"add": [string ... up to 10, priority order], "remove": [string, ...], "pinTop3": [string, string, string]},
  "scorecard": null OR [
    {"section": "Headline", "before": number, "after": number},
    {"section": "About (Hook)", "before": number, "after": number},
    {"section": "About (Full)", "before": number, "after": number},
    {"section": "Experience", "before": number, "after": number},
    {"section": "Skills/Keywords", "before": number, "after": number}
  ],
  "overallBefore": number OR null,
  "overallAfter": number 0-100,
  "plan": [
    {"day": 1, "title": string, "content": string},
    {"day": 2, "title": string, "content": string, "post": string},
    {"day": 3, "title": string, "content": string, "message": string},
    {"day": 4, "title": string, "content": string},
    {"day": 5, "title": string, "content": string, "post": string},
    {"day": 6, "title": string, "content": string},
    {"day": 7, "title": string, "content": string}
  ],
  "summary": {"before": number OR null, "after": number, "mistakes": [string, string, string], "topFix": string}
}

Notes:
- If hasProfile is false: set "roast" to null, "scorecard" to null, "overallBefore" to null, "summary.before" to null. Still fill headlineOptions, about, experienceBullets (use their achievements/projects as the basis, "before" can be null), skillsRec, plan, and summary.after using a reasonable estimated starting-from-scratch score.
- Day 2 and Day 5 "post" fields must be full ready-to-publish LinkedIn posts, under 1300 characters, with a strong hook.
- Day 3 "message" field must be a connection request template under 300 characters.
- experienceBullets: rewrite bullets to lead with achievements, start with action verbs, add numbers/estimates where reasonable, and remove job-description-style phrasing. If hasProfile is false, "before" is null and "after" is a bullet built from their stated achievement.
- Keep all field values plain text (no markdown formatting like ** or #).`;

function buildUserMessage(withProfile){
  if(withProfile){
    return `I have an existing LinkedIn profile. Here is my information:

1. Current Headline: ${val('f_headline')}
2. About Section: ${val('f_about')}
3. Most Recent Experience Entry: ${val('f_experience')}
4. Top Skills: ${val('f_skills')}
5. Target Goal: ${document.getElementById('f_goal').value}

Please roast this profile honestly, rebuild it, and give me the 7-day activation plan, following the JSON shape exactly.`;
  } else {
    return `I don't have a LinkedIn profile yet. Here is my information:

1. Name and current role/student status: ${val('g_name')}
2. Top 3 skills: ${val('g_skills')}
3. Achievements or projects I'm proud of: ${val('g_achieve')}
4. Who I want to attract: ${document.getElementById('g_attract').value}
5. What makes me different: ${val('g_diff')}

Please help me build a strong LinkedIn profile from scratch and give me the 7-day activation plan, following the JSON shape exactly (hasProfile: false, roast: null).`;
  }
}
function val(id){
  const v = document.getElementById(id).value.trim();
  return v || "(not provided)";
}

async function submitAudit(withProfile){
  goStep('loading');
  startLoadingMessages();
  try{
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: [{role:"user", content: buildUserMessage(withProfile)}]
      })
    });
    const data = await response.json();
    clearInterval(loadingInterval);
    let text = (data.content || []).map(b => b.text || "").join("").trim();
    text = text.replace(/^```json\s*/i,"").replace(/^```\s*/,"").replace(/```\s*$/,"").trim();
    let parsed;
    try{
      parsed = JSON.parse(text);
    }catch(e){
      const start = text.indexOf('{'), end = text.lastIndexOf('}');
      parsed = JSON.parse(text.slice(start, end+1));
    }
    renderReport(parsed);
  }catch(err){
    clearInterval(loadingInterval);
    document.getElementById('errorBox').textContent = "Something went wrong generating the audit (" + err.message + "). Please try again.";
    goStep('error');
  }
}

function esc(s){
  if(s===null||s===undefined) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderReport(d){
  document.querySelector('.folder').style.display = 'none';
  const rep = document.getElementById('report');
  rep.style.display = 'block';
  let html = '';

  // PART 1 — ROAST
  if(d.roast){
    html += `<div class="tab">Part 1 — The Roast</div>`;
    html += `<div class="section">`;
    html += `<h2>Profile report card, before</h2><p class="desc">What a recruiter actually thinks in the first 3 seconds.</p>`;
    const sections = [
      ['Headline', d.roast.headline], ['About — First 2 Lines', d.roast.aboutHook],
      ['About — Full Section', d.roast.aboutFull], ['Experience', d.roast.experience],
      ['Skills & Keywords', d.roast.skills]
    ];
    sections.forEach(([label, r])=>{
      if(!r) return;
      html += `<div class="card">
        <div class="card-head"><h3>${esc(label)}</h3><span class="score-pill">${esc(r.score)}/10</span></div>
        <div class="reaction">"${esc(r.reaction)}"</div>
        <div class="kv"><b>Problem</b>${esc(r.problem)}</div>
        <div class="kv"><b>Why it hurts</b>${esc(r.why)}</div>
        <div class="kv"><b>Invisible cost</b>${esc(r.cost)}</div>
      </div>`;
    });
    html += `<div class="overall-row"><div class="stampbig"><span class="num">${esc(d.roast.overall)}</span><span class="denom">/ 100</span></div>
      <p>Overall profile strength, as it stands today. Everything below is the fix.</p></div>`;
    html += `</div>`;
  }

  // PART 2 — REBUILD
  html += `<div class="tab">Part 2 — The Rebuild</div><div class="section">`;
  html += `<h2>Headline options</h2><p class="desc">Formula: Role/Identity | Who I help or what I do | Proof or differentiator</p>`;
  (d.headlineOptions||[]).forEach(o=>{
    html += `<div class="opt"><div class="lab">${esc(o.type)}</div><div class="txt">${esc(o.text)}</div><div class="why">${esc(o.explain)}</div></div>`;
  });

  if(d.about){
    html += `<h2 style="margin-top:26px;">About section, rewritten</h2>`;
    html += `<div class="opt"><div class="lab">The hook</div><div class="txt" style="font-size:15px;">${esc(d.about.hook)}</div></div>`;
    html += `<div class="opt"><div class="lab">The story</div><div class="txt" style="font-size:15px;">${esc(d.about.story)}</div></div>`;
    html += `<div class="opt"><div class="lab">Proof</div><div class="txt" style="font-size:15px;">${esc(d.about.proof)}</div></div>`;
    html += `<div class="opt"><div class="lab">Call to action</div><div class="txt" style="font-size:15px;">${esc(d.about.cta)}</div></div>`;
    if(d.about.keywords && d.about.keywords.length){
      html += `<div class="keywords">${d.about.keywords.map(k=>`<span>${esc(k)}</span>`).join('')}</div>`;
    }
  }

  if(d.experienceBullets && d.experienceBullets.length){
    html += `<h2 style="margin-top:26px;">Experience, rewritten</h2>`;
    d.experienceBullets.forEach(b=>{
      html += `<div class="before-after">`;
      if(b.before){
        html += `<div class="ba-box before"><span class="ba-lab">Before</span>${esc(b.before)}</div>`;
      } else {
        html += `<div class="ba-box before"><span class="ba-lab">Before</span><em>— starting fresh —</em></div>`;
      }
      html += `<div class="ba-box after"><span class="ba-lab">After</span>${esc(b.after)}</div></div>`;
    });
  }

  if(d.skillsRec){
    html += `<h2 style="margin-top:26px;">Skills</h2>`;
    html += `<div class="skill-cols">
      <div><h4 style="color:var(--grow);">Add (priority order)</h4><ul>${(d.skillsRec.add||[]).map(s=>`<li>${esc(s)}</li>`).join('')}</ul></div>
      <div><h4 style="color:var(--roast);">Remove</h4><ul>${(d.skillsRec.remove||[]).map(s=>`<li>${esc(s)}</li>`).join('')}</ul></div>
    </div>`;
    if(d.skillsRec.pinTop3){
      html += `<div class="pin3"><b style="font-family:'IBM Plex Mono',monospace;font-size:11px;text-transform:uppercase;">Pin to top:</b> ${(d.skillsRec.pinTop3||[]).map(esc).join(' · ')}</div>`;
    }
  }
  html += `</div>`;

  // PART 3 — SCORECARD
  if(d.scorecard){
    html += `<div class="tab">Part 3 — Before vs After</div><div class="section">`;
    html += `<table class="scoretable"><tr><th>Section</th><th>Before</th><th>After</th><th>Change</th></tr>`;
    d.scorecard.forEach(row=>{
      const change = row.after - row.before;
      html += `<tr><td>${esc(row.section)}</td><td>${esc(row.before)}/10</td><td>${esc(row.after)}/10</td><td class="delta">+${esc(change)}</td></tr>`;
    });
    html += `</table>`;
    if(d.overallBefore !== null && d.overallBefore !== undefined){
      html += `<div class="overall-final"><div>Overall profile strength</div><div class="num">${esc(d.overallBefore)} → ${esc(d.overallAfter)} <span style="font-size:15px;color:#8fd6b9;">(+${esc(d.overallAfter - d.overallBefore)})</span></div></div>`;
    } else {
      html += `<div class="overall-final"><div>Estimated starting strength once built</div><div class="num">${esc(d.overallAfter)}/100</div></div>`;
    }
    html += `</div>`;
  }

  // PART 4 — 7 DAY PLAN
  html += `<div class="tab">Part 4 — 7-Day Activation Plan</div><div class="section">`;
  html += `<p class="desc">Not just profile edits — the actions that get it seen. Tap each day.</p>`;
  (d.plan||[]).forEach(day=>{
    let extra = '';
    if(day.post) extra += `<div class="opt" style="margin-top:10px;"><div class="lab">Draft post</div><div style="font-size:14px;white-space:pre-line;">${esc(day.post)}</div></div>`;
    if(day.message) extra += `<div class="opt" style="margin-top:10px;"><div class="lab">Connection message</div><div style="font-size:14px;white-space:pre-line;">${esc(day.message)}</div></div>`;
    html += `<div class="day">
      <div class="day-head" onclick="this.parentElement.classList.toggle('open')">
        <div><div class="d">Day ${esc(day.day)}</div><h4>${esc(day.title)}</h4></div>
        <div class="chevron">▸</div>
      </div>
      <div class="day-body"><div class="day-body-inner">${esc(day.content)}${extra}</div></div>
    </div>`;
  });
  html += `</div>`;

  // PART 5 — SUMMARY CARD
  if(d.summary){
    html += `<div class="tab">Part 5 — What I Learned Today</div><div class="section">`;
    html += `<div class="summary-card">
      <div class="sc-kicker">I let AI roast my LinkedIn profile today</div>
      <div class="scores">
        <div><div class="n">${d.summary.before !== null && d.summary.before !== undefined ? esc(d.summary.before) : '—'}</div><div class="l">Before</div></div>
        <div><div class="n" style="color:var(--grow);">${esc(d.summary.after)}</div><div class="l">After</div></div>
      </div>
      <div style="font-family:'Inter',sans-serif;font-size:13.5px;color:#6b7280;margin-bottom:6px;">Top 3 mistakes I was making:</div>
      <ol>${(d.summary.mistakes||[]).map(m=>`<li>${esc(m)}</li>`).join('')}</ol>
      <div class="fix"><b>The #1 thing that made the biggest difference:</b> ${esc(d.summary.topFix)}</div>
    </div>
    <div class="copybtn"><button class="btn ghost" onclick="copySummary(this)">Copy summary to post</button></div>
    </div>`;
  }

  html += `<div class="nav-row" style="justify-content:center;margin-top:10px;"><button class="btn ghost" onclick="location.reload()">Run another audit</button></div>`;

  rep.innerHTML = html;
  rep.dataset.summary = d.summary ? JSON.stringify(d.summary) : '';
  window.scrollTo({top:0,behavior:'smooth'});
}

function copySummary(btn){
  const rep = document.getElementById('report');
  const s = JSON.parse(rep.dataset.summary || '{}');
  const text = `I let AI roast my LinkedIn profile today. Here's what changed:

Before: ${s.before ?? '—'}/100
After: ${s.after}/100

Top 3 mistakes I was making:
1. ${s.mistakes?.[0] || ''}
2. ${s.mistakes?.[1] || ''}
3. ${s.mistakes?.[2] || ''}

The #1 thing that made the biggest difference: ${s.topFix || ''}`;
  navigator.clipboard.writeText(text).then(()=>{
    btn.textContent = 'Copied ✓';
    setTimeout(()=>btn.textContent='Copy summary to post', 1800);
  });
}

renderProgress('0');
</script>
</body>
</html>
