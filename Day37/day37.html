<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Compass — Corporate Office</title>
<style>
  :root{
    --bg:#12151a;
    --bg2:#0d0f13;
    --panel:#1a1f27;
    --panel2:#20262f;
    --line:#2a3140;
    --brass:#c9a227;
    --brass-dim:#8a7220;
    --teal:#3f8f86;
    --teal-dim:#2a615a;
    --ink:#eae7df;
    --muted:#8b93a1;
    --stamp:#b34a3c;
    --good:#6fae7f;
    --shadow: 0 20px 50px rgba(0,0,0,0.45);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(1200px 700px at 15% -10%, rgba(201,162,39,0.07), transparent 60%),
      radial-gradient(1000px 600px at 110% 10%, rgba(63,143,134,0.08), transparent 55%),
      var(--bg);
    color:var(--ink);
    font-family:'Segoe UI', system-ui, -apple-system, sans-serif;
    min-height:100vh;
    padding:28px 16px 60px;
  }
  .display{font-family:Georgia,'Iowan Old Style','Palatino Linotype','Book Antiqua',serif;}
  .mono{font-family:'Consolas','Courier New',monospace; letter-spacing:0.04em;}
  ::selection{background:var(--brass); color:#14171c;}

  .wrap{max-width:920px; margin:0 auto;}

  header.top{
    display:flex; flex-direction:column; align-items:center; text-align:center;
    margin-bottom:26px;
  }
  header.top .eyebrow{
    font-size:11px; letter-spacing:0.25em; text-transform:uppercase; color:var(--brass);
    margin-bottom:10px;
  }
  header.top h1{
    font-size:clamp(30px,5vw,46px); margin:0 0 8px; font-weight:600;
  }
  header.top p.sub{color:var(--muted); margin:0; font-size:15px;}

  /* Progress */
  .progress-rail{
    display:flex; gap:8px; justify-content:center; margin:22px 0 8px;
  }
  .progress-rail .seg{
    flex:1; max-width:120px; height:5px; border-radius:3px; background:var(--line);
    position:relative; overflow:hidden;
  }
  .progress-rail .seg.done{background:var(--brass);}
  .progress-rail .seg.active::after{
    content:''; position:absolute; inset:0; background:var(--brass);
    animation:fillseg 1.2s ease forwards;
  }
  @keyframes fillseg{from{width:0%} to{width:100%}}
  .progress-label{text-align:center; color:var(--muted); font-size:12.5px; margin-bottom:26px;}

  .card{
    background:linear-gradient(180deg, var(--panel), var(--panel2));
    border:1px solid var(--line);
    border-radius:16px;
    box-shadow:var(--shadow);
    padding:28px;
    margin-bottom:20px;
    animation:riseIn .45s ease both;
  }
  @keyframes riseIn{from{opacity:0; transform:translateY(14px)} to{opacity:1; transform:translateY(0)}}

  /* Routing-slip ticket */
  .ticket{
    position:relative;
    background:#181d24;
    border:1px solid var(--line);
    border-radius:10px;
    padding:22px 24px 22px 30px;
    margin-bottom:22px;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.02);
  }
  .ticket::before{
    content:'';
    position:absolute; left:0; top:8px; bottom:8px; width:2px;
    background-image: linear-gradient(var(--line) 60%, transparent 0%);
    background-size: 2px 10px;
    background-repeat: repeat-y;
  }
  .ticket .tk-id{color:var(--brass); font-size:11.5px; margin-bottom:8px; display:block;}
  .ticket .tk-body{font-size:17px; line-height:1.55;}
  .stamp{
    position:absolute; top:14px; right:18px;
    border:2px solid var(--stamp); color:var(--stamp);
    padding:3px 10px; border-radius:6px; font-size:11px; font-weight:700;
    text-transform:uppercase; letter-spacing:0.12em;
    transform:rotate(6deg);
    opacity:0; 
  }
  .stamp.show{animation:stampIn .35s ease forwards .1s;}
  @keyframes stampIn{
    0%{opacity:0; transform:rotate(6deg) scale(1.6);}
    70%{opacity:1; transform:rotate(6deg) scale(0.95);}
    100%{opacity:1; transform:rotate(6deg) scale(1);}
  }

  h2.stage-title{font-size:20px; margin:0 0 4px;}
  p.stage-desc{color:var(--muted); font-size:14px; margin:0 0 20px;}

  /* Role cards / chips */
  .role-grid{
    display:flex; flex-wrap:wrap; gap:10px; margin-bottom:18px;
  }
  .role-card{
    background:var(--panel2);
    border:1px solid var(--line);
    border-radius:10px;
    padding:11px 16px;
    font-size:14px;
    cursor:grab;
    user-select:none;
    transition:transform .15s ease, border-color .15s ease, box-shadow .15s ease, background .15s ease;
    display:flex; align-items:center; gap:8px;
  }
  .role-card .dot{width:8px; height:8px; border-radius:50%; background:var(--brass); flex-shrink:0;}
  .role-card:hover{transform:translateY(-2px); border-color:var(--brass); box-shadow:0 8px 18px rgba(0,0,0,0.3);}
  .role-card.placed{opacity:0.35; cursor:default; pointer-events:none;}
  .role-card.dragging{opacity:0.4;}
  .role-card.selected{border-color:var(--brass); background:rgba(201,162,39,0.12);}

  /* Ownership slot (stage 1) */
  .slot-row{display:flex; align-items:center; gap:16px; margin-bottom:20px; flex-wrap:wrap;}
  .owner-slot{
    flex:1; min-width:220px;
    border:2px dashed var(--line);
    border-radius:12px;
    padding:20px;
    text-align:center;
    color:var(--muted);
    font-size:13.5px;
    transition:border-color .2s ease, background .2s ease;
    min-height:64px;
    display:flex; align-items:center; justify-content:center;
  }
  .owner-slot.hover{border-color:var(--brass); background:rgba(201,162,39,0.06);}
  .owner-slot.filled{
    border-style:solid; border-color:var(--brass); color:var(--ink); font-size:16px; font-weight:600;
    background:rgba(201,162,39,0.08);
  }

  /* Stage 2 sequence rail */
  .seq-rail{display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:20px;}
  .seq-step{
    min-width:150px; flex:1;
    border:2px dashed var(--line); border-radius:10px; padding:16px 10px;
    text-align:center; color:var(--muted); font-size:13px; position:relative;
    min-height:56px; display:flex; align-items:center; justify-content:center;
  }
  .seq-step.filled{border-style:solid; border-color:var(--teal); color:var(--ink); background:rgba(63,143,134,0.1); font-weight:600;}
  .seq-step.hover{border-color:var(--brass);}
  .seq-arrow{color:var(--line); font-size:20px;}
  .seq-step .stepnum{
    position:absolute; top:-9px; left:8px; background:var(--panel); color:var(--brass);
    font-size:10px; padding:0 6px; border-radius:8px; border:1px solid var(--line);
  }

  /* Stage 3 dept toggles */
  .dept-grid{display:flex; flex-wrap:wrap; gap:10px; margin-bottom:18px;}
  .dept-toggle{
    background:var(--panel2); border:1px solid var(--line); border-radius:999px;
    padding:10px 18px; font-size:14px; cursor:pointer; transition:all .15s ease;
    display:flex; align-items:center; gap:8px;
  }
  .dept-toggle:hover{border-color:var(--teal);}
  .dept-toggle.on{background:rgba(63,143,134,0.16); border-color:var(--teal); color:var(--ink);}
  .dept-toggle .check{width:14px; height:14px; border-radius:4px; border:1.5px solid var(--muted); flex-shrink:0;}
  .dept-toggle.on .check{background:var(--teal); border-color:var(--teal);}
  .counter-note{color:var(--muted); font-size:12.5px; margin-bottom:14px;}

  /* Buttons */
  .btn{
    background:var(--brass); color:#181205; border:none; border-radius:9px;
    padding:12px 26px; font-size:14.5px; font-weight:700; cursor:pointer;
    transition:transform .15s ease, box-shadow .15s ease, opacity .15s ease;
    letter-spacing:0.01em;
  }
  .btn:hover:not(:disabled){transform:translateY(-2px); box-shadow:0 10px 22px rgba(201,162,39,0.25);}
  .btn:disabled{opacity:0.35; cursor:not-allowed;}
  .btn.secondary{background:transparent; border:1px solid var(--line); color:var(--ink);}
  .btn.secondary:hover{border-color:var(--muted);}
  .btn-row{display:flex; justify-content:flex-end; gap:10px; margin-top:8px;}

  /* Reveal panel */
  .reveal{
    margin-top:6px; padding-top:18px; border-top:1px dashed var(--line);
    animation:revealIn .4s ease both;
  }
  @keyframes revealIn{from{opacity:0; transform:translateY(8px)} to{opacity:1; transform:translateY(0)}}
  .reveal-line{display:flex; gap:10px; margin-bottom:12px; align-items:flex-start;}
  .reveal-tag{
    flex-shrink:0; font-size:11px; text-transform:uppercase; letter-spacing:0.1em;
    color:var(--brass); border:1px solid var(--brass-dim); border-radius:6px;
    padding:3px 8px; margin-top:2px; white-space:nowrap;
  }
  .reveal-tag.teal{color:var(--teal); border-color:var(--teal-dim);}
  .reveal-text{font-size:14.5px; line-height:1.55; color:var(--ink);}
  .reveal-text .muted-inline{color:var(--muted);}

  /* animated route flow (stage2 reveal) */
  .flow-anim{display:flex; align-items:center; gap:6px; margin:14px 0 18px; flex-wrap:wrap;}
  .flow-node{
    padding:8px 14px; border-radius:8px; font-size:13px; background:var(--panel2);
    border:1px solid var(--line); opacity:0.25; transform:scale(0.9);
  }
  .flow-node.correct{border-color:var(--good);}
  .flow-node.wrong{border-color:var(--stamp);}
  .flow-node.pop{animation:flowPop .5s ease forwards;}
  @keyframes flowPop{to{opacity:1; transform:scale(1);}}
  .flow-arrow{color:var(--muted); opacity:0.25;}
  .flow-arrow.pop{animation:flowPop .5s ease forwards;}

  /* Chart */
  .chart-card{padding:32px 28px;}
  .bar-row{display:flex; align-items:center; gap:14px; margin-bottom:18px;}
  .bar-label{width:150px; font-size:13.5px; color:var(--muted); flex-shrink:0;}
  .bar-track{flex:1; height:14px; background:var(--panel2); border-radius:7px; overflow:hidden; border:1px solid var(--line);}
  .bar-fill{height:100%; border-radius:7px; background:linear-gradient(90deg, var(--teal-dim), var(--teal)); width:0%; transition:width 1.1s cubic-bezier(.22,1,.36,1);}
  .bar-fill.brass{background:linear-gradient(90deg, var(--brass-dim), var(--brass));}
  .bar-val{width:44px; text-align:right; font-size:13px; color:var(--ink);}

  .reflect-list{list-style:none; padding:0; margin:0;}
  .reflect-list li{
    padding:14px 0; border-bottom:1px dashed var(--line); font-size:14.5px; line-height:1.6;
    display:flex; gap:12px;
  }
  .reflect-list li:last-child{border-bottom:none;}
  .reflect-list li .ico{flex-shrink:0; font-size:16px;}

  .celebrate{
    text-align:center; padding:20px 0 4px;
  }
  .celebrate .big{font-size:44px; margin-bottom:6px;}
  .celebrate h3{font-size:22px; margin:0 0 6px;}
  .celebrate p{color:var(--muted); font-size:14px;}

  @media (max-width:640px){
    .card{padding:20px;}
    .owner-slot,.seq-step{min-width:100%;}
    .seq-arrow{display:none;}
    .bar-label{width:110px; font-size:12px;}
  }

  .setup-card{max-width:640px; margin:60px auto; text-align:center;}
  .setup-card h2{margin-top:0;}
  .setup-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:20px;}
  @media (max-width:560px){.setup-grid{grid-template-columns:1fr;}}
  .setup-opt{
    background:var(--panel2); border:1px solid var(--line); border-radius:10px;
    padding:14px; cursor:pointer; font-size:14px; transition:all .15s ease;
  }
  .setup-opt:hover{border-color:var(--brass); transform:translateY(-2px);}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="eyebrow">Task Compass</div>
    <h1 class="display">Learn how work flows through real organizations</h1>
    <p class="sub">Corporate Office edition</p>
  </header>

  <div class="progress-rail" id="progressRail"></div>
  <div class="progress-label" id="progressLabel"></div>

  <div id="app"></div>
</div>

<script>
(function(){

  // ---------- DATA ----------
  const ROLES = [
    {id:'front', name:'Front Desk / Receptionist'},
    {id:'it', name:'IT Support'},
    {id:'hr', name:'HR Coordinator'},
    {id:'office', name:'Office Manager'},
    {id:'finance', name:'Finance & Accounts'},
    {id:'exec', name:'Executive Assistant'},
    {id:'facilities', name:'Facilities Manager'},
    {id:'legal', name:'Legal & Compliance'}
  ];
  const roleName = id => ROLES.find(r=>r.id===id).name;

  const STAGE1_POOL = [
    {
      ticket:'IT-104', text:'The office Wi-Fi has been down all morning, blocking client calls.',
      owner:'it', why:'This is a technical infrastructure failure. IT Support owns the network and is the only role equipped to diagnose and restore it.',
      assist:['office','facilities']
    },
    {
      ticket:'HR-221', text:"A new employee's laptop and building access badge haven't arrived before their start date.",
      owner:'office', why:'Onboarding logistics sit with the Office Manager, who coordinates the moving pieces — even though IT and HR supply parts of it.',
      assist:['it','hr']
    },
    {
      ticket:'HR-118', text:'An employee raises a complaint about harassment from a colleague.',
      owner:'hr', why:'Workplace conduct complaints are HR\u2019s core responsibility, both for employee wellbeing and legal process.',
      assist:['legal','office']
    },
    {
      ticket:'LG-330', text:'The office lease renewal deadline is in two weeks and nobody has reviewed the terms.',
      owner:'legal', why:'Contract terms carry legal and financial risk, so Legal & Compliance leads the review before anyone signs.',
      assist:['office','finance']
    },
    {
      ticket:'FN-092', text:"This month's expense reports don't reconcile with the bank statement.",
      owner:'finance', why:'Reconciliation is a finance function — it requires access to the books and authority to investigate discrepancies.',
      assist:['office','hr']
    },
    {
      ticket:'EA-014', text:"The CEO needs a rebooked flight and hotel ahead of tomorrow's investor meeting.",
      owner:'exec', why:"Executive scheduling and travel is squarely the Executive Assistant's role — fast, direct, and close to the executive's calendar.",
      assist:['office','finance']
    },
    {
      ticket:'FC-205', text:'The air conditioning in the east wing has stopped working.',
      owner:'facilities', why:'Building systems and physical environment are owned by Facilities, who can dispatch the right maintenance contact.',
      assist:['office','it']
    },
    {
      ticket:'LG-441', text:'A vendor contract renewal includes a liability clause nobody has reviewed.',
      owner:'legal', why:'Liability language is a legal risk question first — Legal & Compliance needs to sign off before the business commits.',
      assist:['finance','office']
    },
    {
      ticket:'FD-077', text:'Reception is fielding walk-in visitors for a meeting nobody scheduled.',
      owner:'front', why:'Front Desk is the first point of contact for any visitor and owns triaging who they should be redirected to.',
      assist:['exec','office']
    }
  ];

  const STAGE2_POOL = [
    {
      ticket:'RT-501', text:'A client calls the front desk asking why their invoice is wrong.',
      order:['front','finance','office'],
      reasoning:'Front Desk logs and passes along the client\u2019s concern, Finance & Accounts investigates and corrects the discrepancy, and the Office Manager signs off before the client hears back.'
    },
    {
      ticket:'RT-502', text:'A new hire needs everything ready before their first day.',
      order:['hr','it','facilities','office'],
      reasoning:'HR Coordinator kicks off onboarding, IT Support provisions accounts and hardware, Facilities arranges desk and access, and the Office Manager does a final readiness check.'
    },
    {
      ticket:'RT-503', text:'A legal notice arrives about an upcoming workplace safety inspection.',
      order:['front','office','legal','facilities'],
      reasoning:'Front Desk receives and routes the notice, the Office Manager logs and escalates it, Legal & Compliance assesses what\u2019s required, and Facilities carries out any corrective work.'
    },
    {
      ticket:'RT-504', text:'An employee reports that the expense reimbursement process is broken.',
      order:['hr','finance','office'],
      reasoning:'HR hears the complaint from the employee side, Finance & Accounts investigates the process itself, and the Office Manager approves any policy fix.'
    },
    {
      ticket:'RT-505', text:'An executive needs an urgent contract reviewed before signing tomorrow.',
      order:['exec','legal','finance','office'],
      reasoning:'The Executive Assistant routes the request, Legal & Compliance checks liability terms, Finance & Accounts checks cost implications, and the Office Manager gives the final sign-off before it returns to the executive.'
    }
  ];

  const STAGE3_POOL = [
    {
      ticket:'CX-701', text:'Employee engagement survey scores have dropped sharply this quarter.',
      primary:'hr', supporting:['office','facilities','exec'],
      reasoning:'HR investigates the survey data, but engagement issues often trace back to workspace conditions, day-to-day management, and how visible leadership is — not HR alone.',
      flow:'HR Coordinator gathers the data → shares findings with the Office Manager and Executive Assistant → Facilities addresses any workplace conditions → leadership communicates changes company-wide.'
    },
    {
      ticket:'CX-702', text:'New client sign-ups have grown far faster than expected.',
      primary:'office', supporting:['hr','it','finance'],
      reasoning:'Fast growth strains space and process first, but it also means more hiring, more systems capacity, and closer budget tracking.',
      flow:'Office Manager flags the capacity strain → HR Coordinator opens hiring plans → IT Support scales systems → Finance & Accounts adjusts the budget.'
    },
    {
      ticket:'CX-703', text:'The company has received negative reviews online about its workplace culture.',
      primary:'hr', supporting:['exec','legal','office'],
      reasoning:'Culture concerns need HR to investigate, Legal to check any exposure in the claims, leadership to respond publicly, and day-to-day policy to actually change.',
      flow:'HR Coordinator investigates → Legal & Compliance checks exposure → Executive Assistant briefs leadership → Office Manager updates internal policy.'
    },
    {
      ticket:'CX-704', text:'A major office relocation project is running weeks behind schedule.',
      primary:'facilities', supporting:['office','finance','it'],
      reasoning:'Facilities owns the physical move, but it depends on replanned logistics, a reassessed budget, and IT infrastructure being ready on the new date.',
      flow:'Facilities Manager reports the delay → Finance & Accounts reassesses budget → Office Manager replans logistics → IT Support schedules the infrastructure move.'
    },
    {
      ticket:'CX-705', text:'IT security has flagged unusual login activity across employee accounts.',
      primary:'it', supporting:['legal','hr','exec'],
      reasoning:'IT contains the technical threat, but a security incident also needs a legal read on exposure, HR involvement if it touches an employee, and leadership kept informed.',
      flow:'IT Support contains the issue → Legal & Compliance assesses risk → HR Coordinator investigates the personnel angle → Executive Assistant briefs leadership.'
    }
  ];

  function shuffle(arr){
    const a = arr.slice();
    for(let i=a.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [a[i],a[j]]=[a[j],a[i]];
    }
    return a;
  }
  function pick3(pool){ return shuffle(pool).slice(0,3); }

  // ---------- STATE ----------
  const state = {
    stage: 1,
    idx: 0,
    s1: pick3(STAGE1_POOL),
    s2: pick3(STAGE2_POOL),
    s3: pick3(STAGE3_POOL),
    scores: { ownership:[], delegation:[], collaboration:[], workflow:[] },
    collabTendency: [] // -1 under, 0 spot on-ish, +1 over
  };

  const app = document.getElementById('app');

  function setProgress(){
    const rail = document.getElementById('progressRail');
    const label = document.getElementById('progressLabel');
    rail.innerHTML='';
    const totalSteps = 9;
    let doneSteps = (state.stage-1)*3 + state.idx;
    for(let i=0;i<totalSteps;i++){
      const seg = document.createElement('div');
      seg.className = 'seg';
      if(i < doneSteps) seg.classList.add('done');
      else if(i === doneSteps) seg.classList.add('active');
      rail.appendChild(seg);
    }
    const stageNames=['Who Owns This?','Task Routing','Collaboration Challenge'];
    if(state.stage<=3){
      label.textContent = `Stage ${state.stage} · ${stageNames[state.stage-1]} — question ${state.idx+1} of 3`;
    } else {
      label.textContent = 'Complete';
    }
  }

  // ---------- STAGE 1 ----------
  function renderStage1(){
    const task = state.s1[state.idx];
    setProgress();
    app.innerHTML = `
      <div class="card">
        <h2 class="stage-title">Who owns this?</h2>
        <p class="stage-desc">Drag or tap the role that should <strong>own</strong> this task. Others may still help.</p>
        <div class="ticket">
          <span class="tk-id mono">TICKET ${task.ticket}</span>
          <div class="tk-body">${task.text}</div>
          <div class="stamp" id="stamp1">OWNED</div>
        </div>
        <div class="slot-row">
          <div class="owner-slot" id="ownerSlot">Drop or tap the owning role here</div>
        </div>
        <div class="role-grid" id="roleGrid"></div>
        <div id="reveal1"></div>
        <div class="btn-row">
          <button class="btn" id="submitBtn" disabled>Reveal Ownership</button>
          <button class="btn secondary" id="nextBtn1" style="display:none;">Next Task →</button>
        </div>
      </div>
    `;

    let selected = null;
    const roleGrid = document.getElementById('roleGrid');
    const shuffledRoles = shuffle(ROLES);
    shuffledRoles.forEach(r=>{
      const el = document.createElement('div');
      el.className = 'role-card';
      el.draggable = true;
      el.innerHTML = `<span class="dot"></span>${r.name}`;
      el.dataset.id = r.id;
      el.addEventListener('click', ()=>{
        if(el.classList.contains('placed')) return;
        selectRole(r.id, el);
      });
      el.addEventListener('dragstart', e=>{
        e.dataTransfer.setData('text/plain', r.id);
        el.classList.add('dragging');
      });
      el.addEventListener('dragend', ()=> el.classList.remove('dragging'));
      roleGrid.appendChild(el);
    });

    const slot = document.getElementById('ownerSlot');
    slot.addEventListener('dragover', e=>{ e.preventDefault(); slot.classList.add('hover'); });
    slot.addEventListener('dragleave', ()=> slot.classList.remove('hover'));
    slot.addEventListener('drop', e=>{
      e.preventDefault(); slot.classList.remove('hover');
      const id = e.dataTransfer.getData('text/plain');
      const cardEl = [...roleGrid.children].find(c=>c.dataset.id===id);
      selectRole(id, cardEl);
    });

    function selectRole(id, el){
      [...roleGrid.children].forEach(c=>c.classList.remove('selected'));
      if(el) el.classList.add('selected');
      selected = id;
      slot.textContent = roleName(id);
      slot.classList.add('filled');
      document.getElementById('submitBtn').disabled = false;
    }

    document.getElementById('submitBtn').addEventListener('click', ()=>{
      if(!selected) return;
      const correct = selected === task.owner;
      state.scores.ownership.push(correct ? 100 : 40);
      document.getElementById('stamp1').classList.add('show');
      [...roleGrid.children].forEach(c=>{
        if(c.dataset.id===task.owner || c.dataset.id===selected) c.classList.add('placed');
      });
      document.getElementById('reveal1').innerHTML = `
        <div class="reveal">
          <div class="reveal-line">
            <span class="reveal-tag">Primary owner</span>
            <span class="reveal-text"><strong>${roleName(task.owner)}</strong>${correct ? '' : ` <span class="muted-inline">(you chose ${roleName(selected)})</span>`}</span>
          </div>
          <div class="reveal-line">
            <span class="reveal-tag">Why</span>
            <span class="reveal-text">${task.why}</span>
          </div>
          <div class="reveal-line">
            <span class="reveal-tag teal">May assist</span>
            <span class="reveal-text">${task.assist.map(roleName).join(', ')}</span>
          </div>
        </div>
      `;
      document.getElementById('submitBtn').style.display='none';
      document.getElementById('nextBtn1').style.display='inline-block';
    });

    document.getElementById('nextBtn1').addEventListener('click', ()=>{
      if(state.idx < 2){ state.idx++; renderStage1(); }
      else { state.stage = 2; state.idx = 0; renderStage2(); }
    });
  }

  // ---------- STAGE 2 ----------
  function renderStage2(){
    const task = state.s2[state.idx];
    const steps = task.order.length;
    setProgress();
    app.innerHTML = `
      <div class="card">
        <h2 class="stage-title">Build the routing path</h2>
        <p class="stage-desc">Drag or tap roles into order — this task needs ${steps} steps.</p>
        <div class="ticket">
          <span class="tk-id mono">ROUTE ${task.ticket}</span>
          <div class="tk-body">${task.text}</div>
        </div>
        <div class="seq-rail" id="seqRail"></div>
        <div class="role-grid" id="roleGrid2"></div>
        <div id="reveal2"></div>
        <div class="btn-row">
          <button class="btn" id="submitBtn2" disabled>Submit Route</button>
          <button class="btn secondary" id="nextBtn2" style="display:none;">Next Task →</button>
        </div>
      </div>
    `;

    const seqRail = document.getElementById('seqRail');
    const filled = new Array(steps).fill(null);
    for(let i=0;i<steps;i++){
      if(i>0){
        const arrow = document.createElement('div');
        arrow.className='seq-arrow'; arrow.textContent='→';
        seqRail.appendChild(arrow);
      }
      const step = document.createElement('div');
      step.className='seq-step';
      step.dataset.i = i;
      step.innerHTML = `<span class="stepnum">STEP ${i+1}</span><span class="stepText">Place a role</span>`;
      seqRail.appendChild(step);
    }
    const stepEls = [...seqRail.querySelectorAll('.seq-step')];

    const roleGrid2 = document.getElementById('roleGrid2');
    const pool = shuffle(ROLES);
    pool.forEach(r=>{
      const el = document.createElement('div');
      el.className='role-card';
      el.draggable=true;
      el.innerHTML = `<span class="dot"></span>${r.name}`;
      el.dataset.id = r.id;
      el.addEventListener('click', ()=> placeInNextOpenSlot(r.id, el));
      el.addEventListener('dragstart', e=>{ e.dataTransfer.setData('text/plain', r.id); el.classList.add('dragging'); });
      el.addEventListener('dragend', ()=> el.classList.remove('dragging'));
      roleGrid2.appendChild(el);
    });

    stepEls.forEach(step=>{
      step.addEventListener('dragover', e=>{ e.preventDefault(); step.classList.add('hover'); });
      step.addEventListener('dragleave', ()=> step.classList.remove('hover'));
      step.addEventListener('drop', e=>{
        e.preventDefault(); step.classList.remove('hover');
        const id = e.dataTransfer.getData('text/plain');
        const cardEl = [...roleGrid2.children].find(c=>c.dataset.id===id);
        placeInSlot(step, id, cardEl);
      });
      step.addEventListener('click', ()=>{
        if(filled[+step.dataset.i]){
          const id = filled[+step.dataset.i];
          filled[+step.dataset.i] = null;
          step.classList.remove('filled');
          step.querySelector('.stepText').textContent = 'Place a role';
          const cardEl = [...roleGrid2.children].find(c=>c.dataset.id===id);
          if(cardEl) cardEl.classList.remove('placed');
          updateSubmit2();
        }
      });
    });

    function placeInNextOpenSlot(id, el){
      if(el.classList.contains('placed')) return;
      const openIdx = filled.findIndex(v=>v===null);
      if(openIdx === -1) return;
      placeInSlot(stepEls[openIdx], id, el);
    }
    function placeInSlot(step, id, el){
      const i = +step.dataset.i;
      if(filled[i]){
        const prevEl = [...roleGrid2.children].find(c=>c.dataset.id===filled[i]);
        if(prevEl) prevEl.classList.remove('placed');
      }
      filled[i] = id;
      step.classList.add('filled');
      step.querySelector('.stepText').textContent = roleName(id);
      if(el) el.classList.add('placed');
      updateSubmit2();
    }
    function updateSubmit2(){
      document.getElementById('submitBtn2').disabled = filled.some(v=>v===null);
    }

    document.getElementById('submitBtn2').addEventListener('click', ()=>{
      let matches = 0;
      for(let i=0;i<steps;i++) if(filled[i]===task.order[i]) matches++;
      const accuracy = Math.round((matches/steps)*100);
      state.scores.delegation.push(accuracy);
      state.scores.workflow.push(accuracy);

      const flowWrap = document.createElement('div');
      flowWrap.className='flow-anim';
      task.order.forEach((rid, i)=>{
        if(i>0){
          const a = document.createElement('span'); a.className='flow-arrow'; a.textContent='→';
          flowWrap.appendChild(a);
        }
        const n = document.createElement('div');
        n.className = 'flow-node ' + (filled[i]===rid ? 'correct':'wrong');
        n.textContent = roleName(rid);
        flowWrap.appendChild(n);
      });

      document.getElementById('reveal2').innerHTML = `
        <div class="reveal">
          <div class="reveal-line">
            <span class="reveal-tag">Match</span>
            <span class="reveal-text">${matches} of ${steps} steps matched the common path (${accuracy}%).</span>
          </div>
          <div class="reveal-line">
            <span class="reveal-tag teal">Typical route</span>
            <span class="reveal-text" id="flowHost"></span>
          </div>
          <div class="reveal-line">
            <span class="reveal-tag">Why this order</span>
            <span class="reveal-text">${task.reasoning}</span>
          </div>
        </div>
      `;
      document.getElementById('flowHost').appendChild(flowWrap);
      setTimeout(()=>{
        [...flowWrap.children].forEach((n,i)=>{
          setTimeout(()=> n.classList.add('pop'), i*160);
        });
      }, 50);

      document.getElementById('submitBtn2').style.display='none';
      document.getElementById('nextBtn2').style.display='inline-block';
    });

    document.getElementById('nextBtn2').addEventListener('click', ()=>{
      if(state.idx < 2){ state.idx++; renderStage2(); }
      else { state.stage = 3; state.idx = 0; renderStage3(); }
    });
  }

  // ---------- STAGE 3 ----------
  function renderStage3(){
    const task = state.s3[state.idx];
    setProgress();
    app.innerHTML = `
      <div class="card">
        <h2 class="stage-title">Collaboration challenge</h2>
        <p class="stage-desc">Assign up to <strong>four</strong> roles who should be involved. Think ownership and support together.</p>
        <div class="ticket">
          <span class="tk-id mono">SITUATION ${task.ticket}</span>
          <div class="tk-body">${task.text}</div>
        </div>
        <div class="counter-note" id="counterNote">0 of 4 roles selected</div>
        <div class="dept-grid" id="deptGrid"></div>
        <div id="reveal3"></div>
        <div class="btn-row">
          <button class="btn" id="submitBtn3" disabled>Submit Assignment</button>
          <button class="btn secondary" id="nextBtn3" style="display:none;">${state.idx<2 ? 'Next Situation →' : 'See Your Results →'}</button>
        </div>
      </div>
    `;

    const deptGrid = document.getElementById('deptGrid');
    const chosen = new Set();
    shuffle(ROLES).forEach(r=>{
      const el = document.createElement('div');
      el.className='dept-toggle';
      el.innerHTML = `<span class="check"></span>${r.name}`;
      el.addEventListener('click', ()=>{
        if(chosen.has(r.id)){
          chosen.delete(r.id); el.classList.remove('on');
        } else {
          if(chosen.size>=4) return;
          chosen.add(r.id); el.classList.add('on');
        }
        document.getElementById('counterNote').textContent = `${chosen.size} of 4 roles selected`;
        document.getElementById('submitBtn3').disabled = chosen.size===0;
      });
      deptGrid.appendChild(el);
    });

    document.getElementById('submitBtn3').addEventListener('click', ()=>{
      const recommended = new Set([task.primary, ...task.supporting]);
      const selectedArr = [...chosen];
      const matched = selectedArr.filter(id=>recommended.has(id)).length;
      const recallScore = matched / recommended.size;
      const precisionPenalty = Math.max(0, selectedArr.length - recommended.size) * 0.08;
      const collabScore = Math.max(0, Math.round((recallScore - precisionPenalty)*100));
      state.scores.collaboration.push(collabScore);
      state.scores.workflow.push(chosen.has(task.primary) ? Math.min(100, collabScore+10) : collabScore);

      if(selectedArr.length < recommended.size) state.collabTendency.push(-1);
      else if(selectedArr.length > recommended.size) state.collabTendency.push(1);
      else state.collabTendency.push(0);

      document.getElementById('reveal3').innerHTML = `
        <div class="reveal">
          <div class="reveal-line">
            <span class="reveal-tag">Primary owner</span>
            <span class="reveal-text"><strong>${roleName(task.primary)}</strong>${chosen.has(task.primary) ? '' : ' <span class="muted-inline">(not in your selection)</span>'}</span>
          </div>
          <div class="reveal-line">
            <span class="reveal-tag teal">Supporting teams</span>
            <span class="reveal-text">${task.supporting.map(roleName).join(', ')}</span>
          </div>
          <div class="reveal-line">
            <span class="reveal-tag">Reasoning</span>
            <span class="reveal-text">${task.reasoning}</span>
          </div>
          <div class="reveal-line">
            <span class="reveal-tag teal">Communication flow</span>
            <span class="reveal-text">${task.flow}</span>
          </div>
        </div>
      `;
      document.getElementById('submitBtn3').style.display='none';
      document.getElementById('nextBtn3').style.display='inline-block';
      [...deptGrid.children].forEach(el=>el.style.pointerEvents='none');
    });

    document.getElementById('nextBtn3').addEventListener('click', ()=>{
      if(state.idx < 2){ state.idx++; renderStage3(); }
      else { state.stage = 4; renderResults(); }
    });
  }

  // ---------- RESULTS ----------
  function avg(arr){ return arr.length ? Math.round(arr.reduce((a,b)=>a+b,0)/arr.length) : 0; }

  function renderResults(){
    setProgress();
    document.getElementById('progressLabel').textContent = 'Complete — here is what you understood';

    const scores = {
      Ownership: avg(state.scores.ownership),
      Delegation: avg(state.scores.delegation),
      Collaboration: avg(state.scores.collaboration),
      'Workflow Thinking': avg(state.scores.workflow)
    };

    const overCount = state.collabTendency.filter(t=>t===1).length;
    const underCount = state.collabTendency.filter(t=>t===-1).length;

    let tendencyLine;
    if(underCount > overCount){
      tendencyLine = "Across the collaboration challenges, you tended to name fewer roles than situations like these usually call for — a sign you may default toward single ownership even when a problem is genuinely cross-functional.";
    } else if(overCount > underCount){
      tendencyLine = "Across the collaboration challenges, you tended to bring in more roles than the situation strictly needed — a reasonable instinct, though it's worth asking who's actually needed versus who's just informed.";
    } else {
      tendencyLine = "Your sense of how many people belong on a problem was fairly close to what these situations called for, whether that meant one owner or several.";
    }

    const strengths = Object.entries(scores).sort((a,b)=>b[1]-a[1]);
    const best = strengths[0];
    const weakest = strengths[strengths.length-1];

    app.innerHTML = `
      <div class="card celebrate">
        <div class="big">🗂️</div>
        <h3 class="display">Compass reading complete</h3>
        <p>Here's how your instincts about ownership, delegation, and collaboration held up.</p>
      </div>
      <div class="card chart-card">
        ${Object.entries(scores).map(([label,val])=>`
          <div class="bar-row">
            <div class="bar-label">${label}</div>
            <div class="bar-track"><div class="bar-fill ${label==='Ownership'||label==='Delegation'?'brass':''}" data-val="${val}"></div></div>
            <div class="bar-val">${val}%</div>
          </div>
        `).join('')}
      </div>
      <div class="card">
        <h2 class="stage-title">Final reflection</h2>
        <ul class="reflect-list">
          <li><span class="ico">✓</span><span>You understood <strong>${best[0]}</strong> the most clearly of the four areas (${best[1]}%) — that instinct is likely to transfer well to real coordination work.</span></li>
          <li><span class="ico">△</span><span>${tendencyLine}</span></li>
          <li><span class="ico">○</span><span><strong>${weakest[0]}</strong> was where your answers varied the most (${weakest[1]}%) — worth a second look, though a single playthrough is a small sample.</span></li>
          <li><span class="ico">◆</span><span>Many real workplace problems are solved by teams rather than individuals — ownership usually means being accountable for coordinating the response, not doing every part of it alone.</span></li>
        </ul>
      </div>
      <div class="btn-row" style="justify-content:center;">
        <button class="btn secondary" id="restartBtn">Play Again</button>
      </div>
    `;
    setTimeout(()=>{
      document.querySelectorAll('.bar-fill').forEach(f=>{ f.style.width = f.dataset.val + '%'; });
    }, 80);
    document.getElementById('restartBtn').addEventListener('click', ()=>{
      state.stage=1; state.idx=0;
      state.s1 = pick3(STAGE1_POOL); state.s2 = pick3(STAGE2_POOL); state.s3 = pick3(STAGE3_POOL);
      state.scores = { ownership:[], delegation:[], collaboration:[], workflow:[] };
      state.collabTendency = [];
      renderStage1();
    });
  }

  renderStage1();
})();
</script>
</body>
</html>
