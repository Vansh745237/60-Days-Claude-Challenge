<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketing Detective</title>
<style>
  :root{
    --ink:#070b14;
    --ink-2:#0c1220;
    --cork:#0e1526;
    --paper:#eee6d3;
    --paper-2:#e4d9bf;
    --cobalt:#3d7cff;
    --cobalt-2:#7fb0ff;
    --ice:#bfe6ff;
    --gold:#e8c468;
    --red-pin:#c94b4b;
    --line:rgba(191,230,255,0.12);
    --shadow: 0 10px 30px rgba(0,0,0,0.55);
    --font-display:'Playfair Display', Georgia, 'Times New Roman', serif;
    --font-body: 'Courier New', Courier, monospace;
    --font-hand: Georgia, serif;
  }

  @font-face{
    font-family:'Playfair Display';
    src: local('Playfair Display');
  }

  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(circle at 20% 10%, rgba(61,124,255,0.08), transparent 40%),
      radial-gradient(circle at 80% 90%, rgba(127,176,255,0.06), transparent 45%),
      var(--ink);
    color:var(--ice);
    font-family:var(--font-body);
    overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
  }

  ::selection{ background:var(--cobalt); color:#fff; }

  /* subtle noise / paper grain overlay */
  .grain{
    position:fixed; inset:0; pointer-events:none; z-index:9999;
    opacity:0.045; mix-blend-mode:overlay;
    background-image:
      repeating-linear-gradient(0deg, #fff 0 1px, transparent 1px 2px),
      repeating-linear-gradient(90deg, #fff 0 1px, transparent 1px 2px);
  }

  #app{ position:relative; min-height:100vh; }

  .screen{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:40px 20px 80px;
    animation: fadeIn .6s ease both;
  }
  @keyframes fadeIn{ from{opacity:0; transform:translateY(12px);} to{opacity:1; transform:translateY(0);} }
  @keyframes fadeOut{ from{opacity:1;} to{opacity:0;} }

  h1,h2,h3{ font-family:var(--font-display); font-weight:700; margin:0; }

  .eyebrow{
    letter-spacing:.35em;
    text-transform:uppercase;
    font-size:11px;
    color:var(--cobalt-2);
    font-family:var(--font-body);
    opacity:.85;
    margin-bottom:10px;
  }

  .badge-case{
    display:inline-flex; align-items:center; gap:8px;
    border:1px solid var(--line);
    padding:6px 14px;
    border-radius:999px;
    font-size:12px;
    color:var(--ice);
    background:rgba(61,124,255,0.06);
  }

  /* ---------- Buttons ---------- */
  .btn{
    font-family:var(--font-body);
    letter-spacing:.08em;
    text-transform:uppercase;
    font-size:13px;
    padding:14px 28px;
    border-radius:6px;
    border:1px solid var(--cobalt);
    background:linear-gradient(180deg, rgba(61,124,255,0.18), rgba(61,124,255,0.06));
    color:var(--ice);
    cursor:pointer;
    transition: all .25s ease;
    position:relative;
    overflow:hidden;
  }
  .btn:hover{
    background:linear-gradient(180deg, rgba(61,124,255,0.35), rgba(61,124,255,0.12));
    box-shadow:0 0 24px rgba(61,124,255,0.35);
    transform:translateY(-2px);
  }
  .btn:active{ transform:translateY(0); }
  .btn.ghost{
    background:transparent;
    border-color:var(--line);
    color:var(--cobalt-2);
  }
  .btn.ghost:hover{ border-color:var(--cobalt); box-shadow:0 0 18px rgba(61,124,255,0.2); }
  .btn.gold{
    border-color:var(--gold);
    color:#1c1608;
    background:linear-gradient(180deg,#f1d78a,var(--gold));
    font-weight:700;
  }
  .btn.gold:hover{ box-shadow:0 0 24px rgba(232,196,104,0.45); }
  .btn:disabled{ opacity:.35; cursor:not-allowed; transform:none; box-shadow:none; }

  /* ================= SCREEN 0: THEME + INTRO ================= */
  .cover{
    max-width:720px;
    text-align:center;
    margin-top:6vh;
  }
  .cover .badge-case{ margin-bottom:22px; }
  .cover h1{
    font-size:clamp(38px,7vw,64px);
    line-height:1.05;
    background:linear-gradient(180deg,#fff, var(--cobalt-2));
    -webkit-background-clip:text; background-clip:text; color:transparent;
    text-shadow:0 0 40px rgba(61,124,255,0.25);
  }
  .cover p.lead{
    margin-top:18px; font-size:15px; line-height:1.7; color:#aebfd8;
    max-width:560px; margin-left:auto; margin-right:auto;
  }
  .lamp{
    width:2px; height:70px; margin:0 auto 10px;
    background:linear-gradient(180deg, transparent, var(--cobalt));
    position:relative;
  }
  .lamp::after{
    content:''; position:absolute; left:50%; top:100%; transform:translateX(-50%);
    width:120px; height:120px; border-radius:50%;
    background:radial-gradient(circle, rgba(61,124,255,0.35), transparent 70%);
    filter:blur(4px);
  }

  .theme-grid{
    display:flex; flex-wrap:wrap; gap:16px; justify-content:center; margin:34px 0 30px;
  }
  .theme-card{
    width:150px; padding:16px 14px; border-radius:10px;
    border:1px solid var(--line);
    background:rgba(255,255,255,0.02);
    cursor:pointer; transition:all .25s ease;
    text-align:left;
  }
  .theme-card:hover{ transform:translateY(-4px); border-color:var(--cobalt-2); }
  .theme-card.active{ border-color:var(--gold); box-shadow:0 0 22px rgba(232,196,104,0.3); }
  .theme-swatches{ display:flex; gap:5px; margin-bottom:10px; }
  .swatch{ width:18px; height:18px; border-radius:4px; border:1px solid rgba(255,255,255,.15); }
  .theme-name{ font-family:var(--font-display); font-size:14px; font-weight:700; color:var(--ice); }
  .theme-sub{ font-size:10px; color:#8ea3c2; margin-top:2px; text-transform:uppercase; letter-spacing:.06em; }

  /* ================= SCREEN 1: CASE ASSIGNMENT ================= */
  .file-envelope{
    max-width:640px; width:100%;
    background:linear-gradient(180deg, var(--paper), var(--paper-2));
    color:#241d0f;
    border-radius:4px;
    padding:36px 40px;
    box-shadow:var(--shadow), inset 0 0 60px rgba(0,0,0,0.08);
    position:relative;
    font-family:var(--font-hand);
    transform:rotate(-0.4deg);
    animation: slideDown .7s cubic-bezier(.2,.8,.2,1) both;
  }
  @keyframes slideDown{ from{opacity:0; transform:translateY(-40px) rotate(-2deg);} to{opacity:1; transform:translateY(0) rotate(-0.4deg);} }
  .file-envelope::before{
    content:'CLASSIFIED';
    position:absolute; top:18px; right:-10px;
    font-family:var(--font-body); font-weight:bold; font-size:11px; letter-spacing:.2em;
    color:var(--red-pin); border:2px solid var(--red-pin); padding:3px 10px;
    transform:rotate(8deg); opacity:.8;
  }
  .stamp-row{ display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; font-family:var(--font-body); font-size:11px; text-transform:uppercase; letter-spacing:.15em; color:#6b5f3f;}
  .file-title{ font-size:30px; margin-bottom:4px; }
  .file-sub{ font-size:14px; color:#5b4f31; margin-bottom:22px; font-style:italic; }
  .file-grid{ display:grid; grid-template-columns:1fr 1fr; gap:14px 26px; font-size:14px; margin-bottom:20px;}
  .file-grid .k{ text-transform:uppercase; font-size:10px; letter-spacing:.12em; color:#7a6d47; font-family:var(--font-body); margin-bottom:3px;}
  .file-grid .v{ font-size:15px; color:#241d0f; }
  .file-divider{ border:none; border-top:1px dashed #8d7f56; margin:18px 0; }
  .briefing-text{ font-size:14.5px; line-height:1.6; color:#33291a; }
  .actions-row{ display:flex; gap:14px; justify-content:center; margin-top:30px; }

  /* ================= SCREEN 2/3: BOARD ================= */
  .board-wrap{ width:100%; max-width:1180px; }
  .board-header{ display:flex; justify-content:space-between; align-items:flex-end; flex-wrap:wrap; gap:16px; margin-bottom:22px; }
  .board-title{ font-size:26px; }
  .progress-track{
    width:260px; height:8px; border-radius:999px; background:rgba(255,255,255,0.06);
    overflow:hidden; border:1px solid var(--line);
  }
  .progress-fill{
    height:100%; background:linear-gradient(90deg,var(--cobalt),var(--ice));
    box-shadow:0 0 12px var(--cobalt);
    transition:width .5s ease;
  }
  .progress-label{ font-size:11px; text-transform:uppercase; letter-spacing:.1em; color:#8ea3c2; margin-bottom:6px; }

  .corkboard{
    width:100%;
    background:
      radial-gradient(circle at 10% 10%, rgba(0,0,0,0.25), transparent 60%),
      repeating-radial-gradient(circle at 30% 40%, rgba(120,90,50,0.15) 0 2px, transparent 2px 5px),
      linear-gradient(180deg,#6b4a2e,#5b3d24);
    border-radius:14px;
    border:10px solid #3a2818;
    box-shadow: var(--shadow), inset 0 0 80px rgba(0,0,0,0.5);
    padding:36px 30px;
    position:relative;
    min-height:60vh;
  }
  .corkboard::before{
    content:''; position:absolute; inset:0; border-radius:6px;
    box-shadow: inset 0 0 120px rgba(0,0,0,0.55);
    pointer-events:none;
  }

  .string-svg{ position:absolute; inset:0; width:100%; height:100%; pointer-events:none; z-index:1; }

  .evidence-grid{
    position:relative; z-index:2;
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(190px,1fr));
    gap:26px 22px;
  }

  .card{
    position:relative;
    padding:16px 14px 18px;
    min-height:150px;
    background:var(--paper);
    color:#241d0f;
    box-shadow:0 8px 18px rgba(0,0,0,0.45);
    cursor:pointer;
    transition:transform .25s ease, box-shadow .25s ease;
    font-family:var(--font-hand);
    user-select:none;
  }
  .card:hover{ transform:translateY(-6px) rotate(0deg) scale(1.02); box-shadow:0 16px 30px rgba(0,0,0,0.55); z-index:5;}
  .card.note{ background:#f4e4a1; transform:rotate(-2deg); border-radius:2px 2px 8px 2px;}
  .card.note:nth-child(3n){ background:#a1d8f4; transform:rotate(2deg);}
  .card.note:nth-child(4n){ background:#f4a1c9; transform:rotate(-1.5deg);}
  .card.note:nth-child(5n){ background:#c8f4a1; transform:rotate(1.5deg);}
  .card.folder{ background:var(--paper-2); border-radius:2px; }
  .card.locked{ filter:grayscale(0.4) brightness(.8); }
  .card.revealed{ box-shadow:0 0 0 2px var(--cobalt), 0 10px 24px rgba(0,0,0,0.5); }

  .pin{
    position:absolute; top:-9px; left:50%; transform:translateX(-50%);
    width:16px; height:16px; border-radius:50%;
    background:radial-gradient(circle at 30% 30%, #ff8b8b, var(--red-pin));
    box-shadow:0 3px 6px rgba(0,0,0,0.5);
    z-index:3;
  }
  .card.folder .pin{ background:radial-gradient(circle at 30% 30%, var(--cobalt-2), var(--cobalt)); }

  .card-label{ font-family:var(--font-body); font-size:10px; text-transform:uppercase; letter-spacing:.1em; color:#5b4f31; margin-bottom:6px;}
  .card-title{ font-size:16px; font-weight:700; line-height:1.25; margin-bottom:6px;}
  .card-hint{ font-size:12px; color:#544a2f; line-height:1.4; }
  .card-tag{
    position:absolute; bottom:8px; right:10px;
    font-family:var(--font-body); font-size:9px; letter-spacing:.1em;
    color:#7a6d47; text-transform:uppercase;
  }
  .check-mark{
    position:absolute; top:8px; right:8px;
    width:20px; height:20px; border-radius:50%;
    background:var(--cobalt); color:#fff; font-size:12px;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 0 10px var(--cobalt);
  }

  /* Modal (evidence detail) */
  .overlay{
    position:fixed; inset:0; background:rgba(3,6,14,0.82); backdrop-filter:blur(4px);
    display:flex; align-items:center; justify-content:center; z-index:200;
    animation:fadeIn .3s ease both; padding:20px;
  }
  .modal{
    max-width:560px; width:100%;
    background:linear-gradient(180deg,var(--paper),var(--paper-2));
    color:#241d0f; border-radius:6px; padding:30px 32px;
    box-shadow:0 30px 80px rgba(0,0,0,0.6);
    position:relative;
    animation: popIn .35s cubic-bezier(.2,.9,.3,1.2) both;
    font-family:var(--font-hand);
    max-height:82vh; overflow-y:auto;
  }
  @keyframes popIn{ from{opacity:0; transform:scale(.85) translateY(20px);} to{opacity:1; transform:scale(1) translateY(0);} }
  .modal-close{
    position:absolute; top:14px; right:16px; font-family:var(--font-body);
    background:none; border:none; font-size:20px; cursor:pointer; color:#5b4f31;
  }
  .modal .card-label{ margin-bottom:10px; }
  .modal h3{ font-size:22px; margin-bottom:14px; }
  .modal-body{ font-size:15px; line-height:1.65; color:#33291a; }
  .modal-body table{ width:100%; border-collapse:collapse; margin-top:10px; font-family:var(--font-body); font-size:13px;}
  .modal-body td{ padding:5px 6px; border-bottom:1px solid rgba(0,0,0,0.12); }
  .modal-body td:first-child{ color:#6b5f3f; text-transform:uppercase; font-size:10px; letter-spacing:.08em; }
  .quote{ font-style:italic; padding:10px 14px; border-left:3px solid var(--cobalt); background:rgba(61,124,255,0.06); margin:8px 0; font-size:13.5px; }
  .metric-bars{ margin-top:14px; display:flex; flex-direction:column; gap:10px; }
  .metric-row{ display:flex; align-items:center; gap:10px; font-family:var(--font-body); font-size:11px; }
  .metric-row .m-label{ width:90px; text-transform:uppercase; letter-spacing:.06em; color:#5b4f31; flex-shrink:0;}
  .metric-track{ flex:1; height:8px; background:rgba(0,0,0,0.12); border-radius:6px; overflow:hidden;}
  .metric-fill{ height:100%; border-radius:6px; background:linear-gradient(90deg,var(--cobalt),var(--ice)); width:0%; transition:width 1s cubic-bezier(.2,.8,.2,1); }
  .metric-val{ width:60px; text-align:right; color:#241d0f; font-weight:bold;}

  /* ================= SOLVE SCREEN ================= */
  .solve-wrap{ max-width:760px; width:100%; }
  .solve-intro{ text-align:center; margin-bottom:26px; }
  .option-list{ display:flex; flex-direction:column; gap:14px; }
  .option{
    text-align:left;
    padding:18px 22px;
    border-radius:8px;
    border:1px solid var(--line);
    background:rgba(255,255,255,0.02);
    cursor:pointer;
    transition:all .25s ease;
    display:flex; gap:14px; align-items:flex-start;
  }
  .option:hover{ border-color:var(--cobalt-2); background:rgba(61,124,255,0.06); transform:translateX(4px); }
  .option.selected{ border-color:var(--gold); box-shadow:0 0 20px rgba(232,196,104,0.25); }
  .option.correct{ border-color:#5fd489; box-shadow:0 0 24px rgba(95,212,137,0.35); }
  .option.wrong{ border-color:var(--red-pin); box-shadow:0 0 24px rgba(201,75,75,0.3); }
  .option-letter{
    width:30px; height:30px; border-radius:50%; flex-shrink:0;
    border:1px solid var(--line); display:flex; align-items:center; justify-content:center;
    font-family:var(--font-display); font-weight:700; font-size:13px; color:var(--cobalt-2);
  }
  .option-text{ font-size:14.5px; line-height:1.5; color:#d4e2f5; }

  .clue-strip{
    display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin:22px 0 6px;
  }
  .clue-chip{
    font-size:11px; padding:6px 12px; border-radius:999px;
    border:1px solid var(--line); color:#8ea3c2; background:rgba(255,255,255,0.02);
  }

  /* ================= CASE CLOSED ================= */
  .closed-wrap{
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    min-height:70vh; text-align:center;
  }
  .stamp{
    font-family:var(--font-display); font-weight:900; font-size:clamp(44px,10vw,90px);
    color:var(--red-pin);
    border:6px solid var(--red-pin);
    padding:10px 34px;
    border-radius:10px;
    transform:rotate(-8deg) scale(1.5);
    opacity:0;
    letter-spacing:.05em;
    text-transform:uppercase;
    animation: stampIn .5s ease .2s forwards;
    box-shadow:0 0 40px rgba(201,75,75,0.35);
  }
  @keyframes stampIn{
    0%{ opacity:0; transform:rotate(-8deg) scale(2.4); }
    60%{ opacity:1; transform:rotate(-8deg) scale(1.05); }
    100%{ opacity:1; transform:rotate(-8deg) scale(1); }
  }
  .closed-sub{ margin-top:26px; color:#aebfd8; font-size:14px; max-width:480px; opacity:0; animation: fadeIn .6s ease 1s forwards; }

  /* ================= LEARNING REPORT ================= */
  .report-wrap{ max-width:760px; width:100%; }
  .report-card{
    background:rgba(255,255,255,0.03);
    border:1px solid var(--line);
    border-radius:12px;
    padding:26px 30px;
    margin-bottom:18px;
    animation: fadeIn .5s ease both;
  }
  .report-card h3{ font-size:16px; color:var(--cobalt-2); margin-bottom:10px; display:flex; align-items:center; gap:8px;}
  .report-card p, .report-card li{ font-size:14px; line-height:1.7; color:#cdd9ec; }
  .report-card ul{ margin:0; padding-left:20px; }
  .score-ring-wrap{ display:flex; align-items:center; gap:20px; }
  .score-num{ font-family:var(--font-display); font-size:42px; color:var(--gold); }

  footer.actions{ display:flex; gap:14px; justify-content:center; margin-top:20px; flex-wrap:wrap; }

  /* Toast for wrong guess */
  .toast{
    position:fixed; bottom:30px; left:50%; transform:translateX(-50%) translateY(20px);
    background:var(--ink-2); border:1px solid var(--red-pin); color:#ffd9d9;
    padding:12px 22px; border-radius:8px; font-size:13px; z-index:300;
    box-shadow:0 10px 30px rgba(0,0,0,0.5);
    opacity:0; pointer-events:none;
    transition:all .35s ease;
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  /* scrollbar */
  ::-webkit-scrollbar{ width:10px; }
  ::-webkit-scrollbar-track{ background:transparent; }
  ::-webkit-scrollbar-thumb{ background:rgba(61,124,255,0.35); border-radius:6px; }

  @media (max-width:640px){
    .file-envelope{ padding:26px 20px; }
    .file-grid{ grid-template-columns:1fr; }
    .corkboard{ padding:22px 14px; }
    .evidence-grid{ grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:18px 14px; }
    .board-header{ flex-direction:column; align-items:flex-start; }
  }
</style>
</head>
<body>
<div class="grain"></div>
<div id="app"></div>

<script>
(function(){
"use strict";

/* ============================================================
   THEMES
   ============================================================ */
const THEMES = {
  claude: { name:"Claude Orange", sub:"Warm case-file amber", cobalt:"#d97757", cobalt2:"#ffab84", ice:"#ffd9c2", gold:"#e8c468", red:"#c94b4b", swatches:["#d97757","#ffab84","#0c0906","#e8c468"] },
  crimson:{ name:"Noir Crimson", sub:"Deep red interrogation", cobalt:"#c94b4b", cobalt2:"#ff8b8b", ice:"#ffd2d2", gold:"#e8c468", red:"#8f2323", swatches:["#c94b4b","#ff8b8b","#0e0808","#e8c468"] },
  emerald:{ name:"Emerald Files", sub:"Green & gold ledger", cobalt:"#3fae72", cobalt2:"#8fe0b6", ice:"#d6f5e4", gold:"#e8c468", red:"#c94b4b", swatches:["#3fae72","#8fe0b6","#08120d","#e8c468"] },
  midnight:{ name:"Midnight Blue", sub:"Cobalt & ice", cobalt:"#3d7cff", cobalt2:"#7fb0ff", ice:"#bfe6ff", gold:"#e8c468", red:"#c94b4b", swatches:["#3d7cff","#7fb0ff","#070b14","#e8c468"] }
};

function applyTheme(key){
  const t = THEMES[key] || THEMES.midnight;
  const r = document.documentElement.style;
  r.setProperty('--cobalt', t.cobalt);
  r.setProperty('--cobalt-2', t.cobalt2);
  r.setProperty('--ice', t.ice);
  r.setProperty('--gold', t.gold);
  r.setProperty('--red-pin', t.red);
}

/* ============================================================
   CASE DATA — 12 detailed fictional marketing cases
   ============================================================ */
const CASES = [
{
  company:"Lumora Skincare", industry:"Beauty & Personal Care",
  objective:"Drive trial of a new vitamin-C serum among urban millennials via a 6-week influencer-led launch.",
  audience:"Women 24–34, urban, mid-to-high income, skincare-engaged on Instagram/TikTok.",
  channels:["Instagram Reels","TikTok Influencers","Paid Search","Email"],
  budget:{ "Influencer Fees":42, "Paid Social Ads":28, "Search":15, "Email/CRM":10, "Creative Production":5 },
  metrics:{ reach:"2.4M", ctr:"0.42%", engagement:"6.1%", conversions:"0.6%", sales:"$38K" },
  comments:[
    "Loved every video but couldn't find where to actually buy it from the app.",
    "The influencer's discount code didn't work at checkout, so I gave up.",
    "Saw this everywhere but the site crashed twice when I tried to order."
  ],
  social:"High buzz: 40K comments and 190K shares on launch week, but Instagram Shop tag was missing from 70% of influencer posts, and site analytics show 61% cart abandonment at the payment step.",
  primaryMistake:"A broken, over-complicated checkout funnel (missing shoppable tags, non-functional promo codes, slow site) silently killed conversion despite massive top-of-funnel reach.",
  clues:[
    "Engagement rate is strong (6.1%) but CTR to the website is unusually low relative to reach.",
    "Customer comments repeatedly mention being unable to purchase, not disinterest in the product.",

/* ============================================================
   STATE
   ============================================================ */
const state = {
  screen:'cover',
  theme:'midnight',
  currentCase:null,
  revealed:new Set(),       // ids of revealed evidence cards
  evidenceOrder:[],         // shuffled evidence definitions
  selectedOption:null,
  solvedCorrectly:null,
  attempts:0
};

const root = document.getElementById('app');

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function pickCase(){
  return CASES[Math.floor(Math.random()*CASES.length)];
}

function buildEvidenceList(c){
  return [
    { id:'objective', type:'folder', label:'CASE FILE', title:'Campaign Objective', hint:'Read the brief.', body:`<p>${c.objective}</p><table><tr><td>Industry</td><td class="v">${c.industry}</td></tr><tr><td>Audience</td><td class="v">${c.audience}</td></tr></table>` },
    { id:'channels', type:'folder', label:'STRATEGY NOTES', title:'Marketing Channels & Budget', hint:'Where the money went.', body: budgetHTML(c) },
    { id:'metrics', type:'folder', label:'PERFORMANCE DATA', title:'Campaign Metrics', hint:'The numbers don\'t lie.', body: metricsHTML(c) },
    { id:'comments', type:'note', label:'WITNESS STATEMENTS', title:'Customer Comments', hint:'What people are saying.', body: commentsHTML(c) },
    { id:'social', type:'note', label:'FIELD REPORT', title:'Social Media Performance', hint:'Buzz on the street.', body:`<p>${c.social}</p>` },
    { id:'clue1', type:'note', label:'CLUE 01', title:'Supporting Clue', hint:'Look closer.', body:`<p>${c.clues[0]}</p>` },
    { id:'clue2', type:'note', label:'CLUE 02', title:'Supporting Clue', hint:'Look closer.', body:`<p>${c.clues[1]}</p>` },
    { id:'clue3', type:'note', label:'CLUE 03', title:'Supporting Clue', hint:'Look closer.', body:`<p>${c.clues[2]}</p>` },
  ];
}

function budgetHTML(c){
  let rows='';
  for(const k in c.budget){
    rows += `<div class="metric-row"><div class="m-label">${k}</div><div class="metric-track"><div class="metric-fill" data-w="${c.budget[k]*2}"></div></div><div class="metric-val">${c.budget[k]}%</div></div>`;
  }
  const chans = c.channels.map(ch=>`<span class="clue-chip">${ch}</span>`).join('');
  return `<div class="clue-strip" style="justify-content:flex-start;margin:0 0 14px;">${chans}</div><div class="metric-bars">${rows}</div>`;
}
function metricsHTML(c){
  const m = c.metrics;
  const keys = Object.keys(m);
  let rows='';
  keys.forEach((k,i)=>{
    rows += `<div class="metric-row"><div class="m-label">${k}</div><div class="metric-track"><div class="metric-fill" data-w="${40+i*8}"></div></div><div class="metric-val">${m[k]}</div></div>`;
  });
  return `<div class="metric-bars">${rows}</div>`;
}
function commentsHTML(c){
  return c.comments.map(q=>`<div class="quote">&ldquo;${q}&rdquo;</div>`).join('');
}

/* ============================================================
   RENDER HELPERS
   ============================================================ */
function el(tag, attrs, html){
  const e = document.createElement(tag);
  if(attrs) for(const k in attrs) e.setAttribute(k, attrs[k]);
  if(html!==undefined) e.innerHTML = html;
  return e;
}

function clearRoot(){ root.innerHTML=''; }

function showToast(msg){
  const t = el('div',{class:'toast'}, msg);
  document.body.appendChild(t);
  requestAnimationFrame(()=> t.classList.add('show'));
  setTimeout(()=>{ t.classList.remove('show'); setTimeout(()=>t.remove(),400); }, 2400);
}

   SCREEN: COVER / THEME SELECT
   ============================================================ */
function renderCover(){
  clearRoot();
  const wrap = el('div',{class:'screen'});
  const cover = el('div',{class:'cover'});
  cover.innerHTML = `
    <div class="badge-case">FILE No. MD-${new Date().getFullYear()}-001 &middot; UNSOLVED</div>
    <div class="lamp"></div>
    <h1>Marketing Detective</h1>
    <p class="lead">A campaign has failed. The client wants answers. Study the file, walk the corkboard,
    interrogate the evidence — and name the mistake before the trail goes cold.</p>
  `;

  const grid = el('div',{class:'theme-grid'});
  Object.keys(THEMES).forEach(key=>{
    const t = THEMES[key];
    const card = el('div',{class:'theme-card'+(state.theme===key?' active':''), 'data-key':key});
    card.innerHTML = `
      <div class="theme-swatches">${t.swatches.map(s=>`<div class="swatch" style="background:${s}"></div>`).join('')}</div>
      <div class="theme-name">${t.name}</div>
      <div class="theme-sub">${t.sub}</div>
    `;
    card.addEventListener('click', ()=>{
      state.theme = key;
      applyTheme(key);
      [...grid.children].forEach(c=>c.classList.remove('active'));
      card.classList.add('active');
    });
    grid.appendChild(card);
  });

  const actions = el('div',{class:'actions-row'});
  const startBtn = el('button',{class:'btn gold'}, 'Take the Case');
  startBtn.addEventListener('click', ()=>{
    state.currentCase = pickCase();
    state.revealed = new Set();
    state.evidenceOrder = shuffle(buildEvidenceList(state.currentCase));
    state.selectedOption = null;
    state.solvedCorrectly = null;
    state.screen='assignment';
    render();
  });
  actions.appendChild(startBtn);

  cover.appendChild(grid);
  cover.appendChild(actions);
  wrap.appendChild(cover);
  root.appendChild(wrap);
}

/* ============================================================
   SCREEN: CASE ASSIGNMENT
   ============================================================ */
function renderAssignment(){
  clearRoot();
  const c = state.currentCase;
  const wrap = el('div',{class:'screen'});
  const env = el('div',{class:'file-envelope'});
  env.innerHTML = `
    <div class="stamp-row"><span>Marketing Investigations Bureau</span><span>Priority: High</span></div>
    <div class="file-title">${c.company}</div>
    <div class="file-sub">${c.industry} &middot; Case assigned to you, Detective</div>
    <div class="file-grid">
      <div><div class="k">Target Audience</div><div class="v">${c.audience}</div></div>
      <div><div class="k">Channels Used</div><div class="v">${c.channels.join(', ')}</div></div>
    </div>
    <hr class="file-divider">
    <div class="briefing-text"><strong>Client briefing:</strong> ${c.objective}
    <br><br>Something went wrong. Reach, spend, and buzz all tell one story — but sales tell another.
    Your job is to walk the investigation board, examine every piece of evidence, and identify the
    <strong>one primary marketing mistake</strong> that sank this campaign.</div>
  `;
  const actions = el('div',{class:'actions-row'});
  const boardBtn = el('button',{class:'btn'}, 'Open Investigation Board →');
  boardBtn.addEventListener('click', ()=>{ state.screen='board'; render(); });
  actions.appendChild(boardBtn);
  env.appendChild(actions);
  wrap.appendChild(env);
  root.appendChild(wrap);
}

/* ============================================================
   SCREEN: INVESTIGATION BOARD
   ============================================================ */
function renderBoard(){
  clearRoot();
  const c = state.currentCase;
  const wrap = el('div',{class:'screen'});
  const boardWrap = el('div',{class:'board-wrap'});

  const header = el('div',{class:'board-header'});
  header.innerHTML = `
    <div>
      <div class="eyebrow">Investigation Board</div>
      <div class="board-title">${c.company} — pin the truth</div>
    </div>
    <div>
      <div class="progress-label">Evidence examined: ${state.revealed.size} / ${state.evidenceOrder.length}</div>
      <div class="progress-track"><div class="progress-fill" style="width:${(state.revealed.size/state.evidenceOrder.length*100)}%"></div></div>
    </div>
  `;
  boardWrap.appendChild(header);

  const cork = el('div',{class:'corkboard'});
  const grid = el('div',{class:'evidence-grid'});

  state.evidenceOrder.forEach(ev=>{
    const isRevealed = state.revealed.has(ev.id);
    const card = el('div',{class:`card ${ev.type==='note'?'note':'folder'} ${isRevealed?'revealed':''}`});
    card.innerHTML = `
      <div class="pin"></div>
      ${isRevealed?'<div class="check-mark">&#10003;</div>':''}
      <div class="card-label">${ev.label}</div>
      <div class="card-title">${ev.title}</div>
      <div class="card-hint">${isRevealed ? 'Examined — click to review again.' : ev.hint}</div>
      <div class="card-tag">${ev.type==='note'?'Sticky Note':'Case Folder'}</div>
    `;
    card.addEventListener('click', ()=> openEvidence(ev));
    grid.appendChild(card);
  });

  cork.appendChild(grid);
  boardWrap.appendChild(cork);

  const actions = el('div',{class:'actions-row'});
  const solveBtn = el('button',{class:'btn gold'}, 'I Know What Happened — Solve the Case');
  solveBtn.disabled = state.revealed.size < 4;
  if(state.revealed.size < 4){
    solveBtn.title = 'Examine at least 4 pieces of evidence first';
  }
  solveBtn.addEventListener('click', ()=>{ state.screen='solve'; render(); });
  actions.appendChild(solveBtn);
  boardWrap.appendChild(actions);

  wrap.appendChild(boardWrap);
  root.appendChild(wrap);
}

function openEvidence(ev){
  state.revealed.add(ev.id);
  const overlay = el('div',{class:'overlay'});
  const modal = el('div',{class:'modal'});
  modal.innerHTML = `
    <button class="modal-close" aria-label="Close">&times;</button>
    <div class="card-label">${ev.label}</div>
    <h3>${ev.title}</h3>
    <div class="modal-body">${ev.body}</div>
  `;
  overlay.appendChild(modal);
  document.body.appendChild(overlay);

  // animate metric fills
  requestAnimationFrame(()=>{
    modal.querySelectorAll('.metric-fill').forEach(f=>{
      const w = f.getAttribute('data-w');
      requestAnimationFrame(()=> f.style.width = Math.min(100,parseFloat(w))+'%');
    });
  });

  function close(){
    overlay.style.animation='fadeOut .25s ease forwards';
    setTimeout(()=>{ overlay.remove(); render(); }, 220);
  }
  overlay.addEventListener('click', e=>{ if(e.target===overlay) close(); });
  modal.querySelector('.modal-close').addEventListener('click', close);
}

/* ============================================================
   SCREEN: SOLVE THE CASE
   ============================================================ */
function buildOptions(c){
  // correct + 3 distractors pulled from other cases' mistakes
  const distractors = shuffle(CASES.filter(x=>x!==c)).slice(0,3).map(x=>x.primaryMistake);
  const opts = shuffle([c.primaryMistake, ...distractors]);
  return opts;
}

let cachedOptions = null;

function renderSolve(){
  clearRoot();
  const c = state.currentCase;
  if(!cachedOptions) cachedOptions = buildOptions(c);
  const opts = cachedOptions;

  const wrap = el('div',{class:'screen'});
  const solveWrap = el('div',{class:'solve-wrap'});

  const intro = el('div',{class:'solve-intro'});
  intro.innerHTML = `
    <div class="eyebrow">Final Deduction</div>
    <h2>What was ${c.company}'s primary mistake?</h2>
    <p style="color:#aebfd8;font-size:14px;margin-top:10px;">Choose the explanation that best fits every clue on the board.</p>
  `;
  solveWrap.appendChild(intro);

  const list = el('div',{class:'option-list'});
  const letters = ['A','B','C','D'];

  opts.forEach((opt,i)=>{
    const optEl = el('div',{class:'option'});
    optEl.innerHTML = `<div class="option-letter">${letters[i]}</div><div class="option-text">${opt}</div>`;
    optEl.addEventListener('click', ()=>{
      if(state.solvedCorrectly!==null) return; // already answered
      state.attempts++;
      const correct = opt === c.primaryMistake;
      [...list.children].forEach(o=>o.classList.remove('selected'));
      optEl.classList.add('selected');
      if(correct){
        state.solvedCorrectly = true;
        optEl.classList.add('correct');
        setTimeout(()=>{ state.screen='closed'; render(); }, 900);
      } else {
        optEl.classList.add('wrong');
        showToast('Not quite. Re-examine the evidence and try again.');
        setTimeout(()=> optEl.classList.remove('wrong','selected'), 1100);
      }
    });
    list.appendChild(optEl);
  });
  solveWrap.appendChild(list);

  const back = el('div',{class:'actions-row'});
  const backBtn = el('button',{class:'btn ghost'}, '← Back to Board');
  backBtn.addEventListener('click', ()=>{ state.screen='board'; render(); });
  back.appendChild(backBtn);
  solveWrap.appendChild(back);

  wrap.appendChild(solveWrap);
  root.appendChild(wrap);
}

/* ============================================================
   SCREEN: CASE CLOSED
   ============================================================ */
function renderClosed(){
  clearRoot();
  const c = state.currentCase;
  const wrap = el('div',{class:'screen closed-wrap'});
  wrap.innerHTML = `
    <div class="stamp">Case Closed</div>
    <div class="closed-sub">You correctly identified the mistake behind ${c.company}'s campaign failure
    in ${state.attempts} attempt${state.attempts===1?'':'s'}. Review the full learning report to lock in the lesson.</div>
  `;
  const actions = el('div',{class:'actions-row'});
  actions.style.marginTop='30px';
  actions.style.opacity='0';
  actions.style.animation='fadeIn .6s ease 1.3s forwards';
  const reportBtn = el('button',{class:'btn gold'}, 'View Learning Report →');
  reportBtn.addEventListener('click', ()=>{ state.screen='report'; render(); });
  actions.appendChild(reportBtn);
  wrap.appendChild(actions);
  root.appendChild(wrap);
}

/* ============================================================
   SCREEN: LEARNING REPORT
   ============================================================ */
function renderReport(){
  clearRoot();
  const c = state.currentCase;
  const wrap = el('div',{class:'screen'});
  const rw = el('div',{class:'report-wrap'});

  rw.innerHTML = `
    <div style="text-align:center;margin-bottom:26px;">
      <div class="eyebrow">Debrief</div>
      <h2 style="font-size:28px;">${c.company} — Learning Report</h2>
    </div>
  `;

  const mistakeCard = el('div',{class:'report-card'});
  mistakeCard.innerHTML = `<h3>🔎 The Primary Mistake</h3><p>${c.primaryMistake}</p>`;
  rw.appendChild(mistakeCard);

  const explCard = el('div',{class:'report-card'});
  explCard.innerHTML = `<h3>🧭 Correct Explanation</h3><p>${c.correctExplanation}</p>`;
  rw.appendChild(explCard);

  const cluesCard = el('div',{class:'report-card'});
  cluesCard.innerHTML = `<h3>📌 Supporting Clues</h3><ul>${c.clues.map(cl=>`<li>${cl}</li>`).join('')}</ul>`;
  rw.appendChild(cluesCard);

  const impCard = el('div',{class:'report-card'});
  impCard.innerHTML = `<h3>💡 Suggested Improvements</h3><ul>${c.improvements.map(im=>`<li>${im}</li>`).join('')}</ul>`;
  rw.appendChild(impCard);

  const scoreCard = el('div',{class:'report-card'});
  scoreCard.innerHTML = `
    <h3>🏅 Detective Score</h3>
    <div class="score-ring-wrap">
      <div class="score-num">${Math.max(10,100-((state.attempts-1)*25))}</div>
      <div style="font-size:13px;color:#aebfd8;">Points earned this case, based on evidence examined (${state.revealed.size}/${state.evidenceOrder.length}) and solve attempts (${state.attempts}).</div>
    </div>
  `;
  rw.appendChild(scoreCard);

  const footer = el('footer',{class:'actions'});
  const again = el('button',{class:'btn gold'}, 'Investigate a New Case');
  again.addEventListener('click', ()=>{
    cachedOptions = null;
    state.currentCase = pickCase();
    state.revealed = new Set();
    state.evidenceOrder = shuffle(buildEvidenceList(state.currentCase));
    state.selectedOption = null;
    state.solvedCorrectly = null;
    state.attempts = 0;
    state.screen='assignment';
    render();
  });
  const home = el('button',{class:'btn ghost'}, 'Back to Title Screen');
  home.addEventListener('click', ()=>{ state.screen='cover'; render(); });
  footer.appendChild(again);
  footer.appendChild(home);
  rw.appendChild(footer);

  wrap.appendChild(rw);
  root.appendChild(wrap);
}

/* ============================================================
   MAIN RENDER SWITCH
   ============================================================ */
function render(){
  switch(state.screen){
    case 'cover': renderCover(); break;
    case 'assignment': renderAssignment(); break;
    case 'board': renderBoard(); break;
    case 'solve': renderSolve(); break;
    case 'closed': renderClosed(); break;
    case 'report': renderReport(); break;
    default: renderCover();
  }
}

applyTheme(state.theme);
render();

})();
</script>
</body>
</html>
